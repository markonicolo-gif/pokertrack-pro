<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokerTrack Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<style>
:root {
  --bg: #07090f;
  --bg2: #0d1117;
  --bg3: #111827;
  --card: #0f1623;
  --card2: #151f2e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --green: #00d4aa;
  --green2: #10b981;
  --green-dim: rgba(0,212,170,0.12);
  --red: #f43f5e;
  --red-dim: rgba(244,63,94,0.12);
  --gold: #f59e0b;
  --gold-dim: rgba(245,158,11,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --purple: #8b5cf6;
  --purple-dim: rgba(139,92,246,0.12);
  --radius: 12px;
  --radius-lg: 16px;
  --sidebar-w: 220px;
  --transition: 0.18s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 200;
  padding: 0 0 1rem;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 1.4rem 1.2rem 1.2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.5rem;
}

.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--green), #0891b2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}

.logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
.logo-sub { font-size: 0.65rem; color: var(--text3); font-weight: 400; }

.nav-section { padding: 0 0.75rem; margin-bottom: 0.25rem; }
.nav-label { font-size: 0.65rem; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 0.5rem 0.5rem 0.25rem; }

.nav-item {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.6rem 0.75rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text2);
  border: none; background: none; width: 100%; text-align: left;
  margin-bottom: 2px;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.nav-item.active { background: var(--green-dim); color: var(--green); }
.nav-item.active .nav-icon { color: var(--green); }
.nav-icon { font-size: 1rem; width: 18px; text-align: center; }

.sidebar-bankroll {
  margin: auto 0.75rem 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem;
}
.sb-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
.sb-value { font-size: 1.3rem; font-weight: 700; color: var(--green); }
.sb-input {
  background: transparent;
  border: none;
  color: var(--green);
  font-size: 1.3rem;
  font-weight: 700;
  font-family: inherit;
  width: 100%;
  outline: none;
}
.sb-input::placeholder { color: var(--text3); }

/* ===== MAIN ===== */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 1.75rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}

.topbar-title { font-size: 1.05rem; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 0.75rem; }

.live-badge {
  display: flex; align-items: center; gap: 0.4rem;
  background: rgba(244,63,94,0.15);
  border: 1px solid rgba(244,63,94,0.3);
  color: var(--red);
  padding: 0.3rem 0.75rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.live-badge:hover { background: rgba(244,63,94,0.25); }
.live-dot {
  width: 6px; height: 6px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.live-badge.active { background: rgba(0,212,170,0.15); border-color: rgba(0,212,170,0.3); color: var(--green); }
.live-badge.active .live-dot { background: var(--green); }

#content { padding: 1.5rem 1.75rem; flex: 1; }

/* ===== BUTTONS ===== */
.btn {
  padding: 0.55rem 1.1rem;
  border: none; border-radius: 8px;
  font-size: 0.875rem; cursor: pointer;
  transition: all var(--transition);
  font-weight: 500; font-family: inherit;
  display: inline-flex; align-items: center; gap: 0.4rem;
}
.btn-primary { background: var(--green); color: #000; }
.btn-primary:hover { background: #00e6b8; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,212,170,0.3); }
.btn-secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: var(--border2); }
.btn-secondary.active { background: var(--green-dim); color: var(--green); border-color: rgba(0,212,170,0.3); }
.btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }
.btn-danger:hover { background: rgba(244,63,94,0.25); }
.btn-gold { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }
.btn-gold:hover { background: rgba(245,158,11,0.25); }
.btn-sm { padding: 0.38rem 0.8rem; font-size: 0.8rem; }
.btn-xs { padding: 0.25rem 0.6rem; font-size: 0.75rem; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

.btn-icon {
  background: none; border: none;
  color: var(--text3); cursor: pointer;
  font-size: 0.9rem; padding: 0.35rem;
  border-radius: 6px; transition: all var(--transition);
  line-height: 1;
}
.btn-icon:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.edit-btn:hover { color: var(--blue); }
.delete-btn:hover { color: var(--red); }

/* ===== CARDS ===== */
.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 1.25rem;
}
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.card-title { font-size: 0.875rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.card-title-lg { font-size: 1rem; font-weight: 600; color: var(--text); }

/* ===== STAT CARDS ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1rem;
}

.stat-card {
  background: var(--card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 1.1rem 1.25rem;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition), transform var(--transition);
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-color, var(--green)), transparent);
  opacity: 0.6;
}
.stat-card.green::before { --accent-color: var(--green); }
.stat-card.red::before { --accent-color: var(--red); }
.stat-card.gold::before { --accent-color: var(--gold); }
.stat-card.blue::before { --accent-color: var(--blue); }
.stat-card.purple::before { --accent-color: var(--purple); }

.stat-icon { font-size: 1.2rem; margin-bottom: 0.6rem; }
.stat-label { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 0.3rem; }
.stat-value { font-size: 1.4rem; font-weight: 700; line-height: 1; }
.stat-value.positive { color: var(--green); }
.stat-value.negative { color: var(--red); }
.stat-value.neutral { color: var(--text); }
.stat-value.gold { color: var(--gold); }
.stat-sub { font-size: 0.72rem; color: var(--text3); margin-top: 0.3rem; }

/* ===== FORM ===== */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 0.9rem;
}
.form-group { display: flex; flex-direction: column; gap: 0.35rem; }
.form-group.full { grid-column: 1 / -1; }
.form-group.span2 { grid-column: span 2; }
label { font-size: 0.75rem; color: var(--text2); font-weight: 500; }
input, textarea, select {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.55rem 0.8rem;
  border-radius: 8px;
  font-size: 0.875rem;
  font-family: inherit;
  transition: border-color var(--transition);
  -webkit-appearance: none;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
}
select option { background: var(--bg3); }
textarea { resize: vertical; min-height: 64px; }

.mood-row { display: flex; gap: 0.5rem; }
.mood-btn {
  flex: 1; padding: 0.5rem;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer;
  font-size: 1.2rem; text-align: center;
  transition: all var(--transition);
}
.mood-btn:hover { border-color: var(--border2); background: var(--card2); }
.mood-btn.selected { border-color: var(--green); background: var(--green-dim); }

.tags-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.tag-chip {
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  transition: all var(--transition);
}
.tag-chip:hover { border-color: var(--border2); color: var(--text); }
.tag-chip.selected { background: var(--green-dim); border-color: rgba(0,212,170,0.4); color: var(--green); }

.form-actions { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; }

/* ===== TABLE ===== */
.table-wrapper { overflow-x: auto; margin-top: 1rem; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th {
  text-align: left;
  padding: 0.6rem 0.75rem;
  border-bottom: 1px solid var(--border);
  color: var(--text3);
  font-weight: 600;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  background: var(--bg2);
}
th:first-child { border-radius: 8px 0 0 0; }
th:last-child { border-radius: 0 8px 0 0; }
th.sortable { cursor: pointer; }
th.sortable:hover { color: var(--text); }
td {
  padding: 0.65rem 0.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  white-space: nowrap;
  color: var(--text);
}
tr:hover td { background: rgba(255,255,255,0.025); }
tr:last-child td { border-bottom: none; }
.positive { color: var(--green) !important; font-weight: 600; }
.negative { color: var(--red) !important; font-weight: 600; }
.notes-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; color: var(--text3) !important; font-weight: 400 !important; }
.action-cell { display: flex; gap: 0.2rem; }

/* ===== GROUP BUTTON GROUP ===== */
.group-btn-group { display: flex; gap: 0; }
.group-btn-group .btn { border-radius: 0; border-right-width: 0; }
.group-btn-group .btn:first-child { border-radius: 6px 0 0 6px; }
.group-btn-group .btn:last-child { border-radius: 0 6px 6px 0; border-right-width: 1px; }

/* ===== DAY GROUP STYLES ===== */
.day-group-header { cursor: pointer; user-select: none; }
.day-group-header:hover .day-group-th { background: rgba(255,255,255,0.06) !important; }
.day-group-th {
  padding: 0.55rem 0.75rem !important;
  background: rgba(255,255,255,0.03) !important;
  border-top: 1px solid var(--border2) !important;
  border-bottom: 1px solid var(--border) !important;
  text-transform: none !important;
  letter-spacing: 0 !important;
  font-size: 0.82rem !important;
  font-weight: 500 !important;
  color: var(--text) !important;
}
.day-group-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.day-group-left { display: flex; align-items: center; gap: 0.6rem; }
.day-group-right { display: flex; align-items: center; gap: 1rem; }
.day-toggle { font-size: 0.65rem; color: var(--text3); transition: transform 0.15s; }
.day-date { font-weight: 600; color: var(--text); }
.day-count { font-size: 0.75rem; color: var(--text3); background: rgba(255,255,255,0.06); padding: 0.1rem 0.5rem; border-radius: 999px; }
.day-hours { font-size: 0.78rem; color: var(--text2); }
.day-profit { font-size: 0.85rem; font-weight: 700; }
.day-cols-header { background: var(--bg2) !important; }
.day-cols-header th { background: var(--bg2) !important; font-size: 0.7rem !important; padding: 0.3rem 0.75rem !important; }

.profit-bar {
  display: inline-flex; align-items: center; gap: 0.4rem;
}
.profit-pill {
  padding: 0.15rem 0.6rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
}
.profit-pill.pos { background: rgba(0,212,170,0.12); color: var(--green); }
.profit-pill.neg { background: rgba(244,63,94,0.12); color: var(--red); }

.table-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; }
.table-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.search-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.4rem 0.75rem;
  border-radius: 8px;
  font-size: 0.82rem;
  width: 200px;
}

.pagination-bar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 0.75rem;
  padding: 0.9rem 0.5rem 0.25rem;
  border-top: 1px solid var(--border);
  margin-top: 0.5rem;
}
.pagination-info { font-size: 0.78rem; color: var(--text3); }
.pagination-info strong { color: var(--text2); }
.pagination-controls { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
.page-btn {
  padding: 0.3rem 0.65rem; border-radius: 7px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text2); font-size: 0.8rem;
  cursor: pointer; transition: all var(--transition); font-family: inherit;
}
.page-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.page-btn.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-ellipsis { color: var(--text3); padding: 0 0.2rem; font-size: 0.8rem; }
.pagination-size select {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  padding: 0.3rem 0.5rem; border-radius: 7px; font-size: 0.78rem; font-family: inherit; cursor: pointer;
}

.bulk-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 0.75rem;
  background: rgba(244,63,94,0.06);
  border: 1px solid rgba(244,63,94,0.2);
  border-radius: 10px;
  padding: 0.75rem 1rem;
  margin-top: 0.75rem;
}
.bulk-filters { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
.bulk-count { font-size: 0.82rem; font-weight: 600; color: var(--red); min-width: 80px; }

.csv-drop-zone {
  display: inline-flex;
  align-items: center;
  padding: 0.38rem 0.8rem;
  background: rgba(255,255,255,0.06);
  border: 1px dashed var(--border2);
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
}
.csv-drop-zone:hover { background: rgba(255,255,255,0.1); border-color: var(--green); color: var(--text); }
.csv-drop-zone.drag-over { background: var(--green-dim); border-color: var(--green); color: var(--green); transform: scale(1.03); }

/* ===== CHARTS ===== */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.25rem;
}
.chart-card {
  background: var(--card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 1.25rem;
}
.chart-card.full { grid-column: 1 / -1; }
.chart-card h3 { font-size: 0.82rem; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }

/* ===== FILTERS ===== */
.filters-bar {
  display: flex; align-items: flex-end; gap: 0.75rem; flex-wrap: wrap;
  background: var(--card);
  padding: 1rem 1.25rem;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  margin-bottom: 1.25rem;
}
.filter-group { display: flex; flex-direction: column; gap: 0.3rem; }
.filter-group label { font-size: 0.72rem; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.filter-group input, .filter-group select {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.42rem 0.7rem;
  border-radius: 8px;
  font-size: 0.82rem;
  min-width: 120px;
}

/* ===== DASHBOARD ===== */
.hero-card {
  background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
  border: 1px solid rgba(0,212,170,0.15);
  border-radius: var(--radius-lg);
  padding: 1.75rem;
  position: relative;
  overflow: hidden;
  margin-bottom: 1.25rem;
}
.hero-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero-card::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 40%;
  width: 300px; height: 200px;
  background: radial-gradient(circle, rgba(59,130,246,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label { font-size: 0.8rem; color: var(--text3); font-weight: 500; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
.hero-profit { font-size: 2.8rem; font-weight: 800; line-height: 1; margin-bottom: 0.5rem; }
.hero-profit.positive { color: var(--green); }
.hero-profit.negative { color: var(--red); }
.hero-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.hero-meta-item { font-size: 0.82rem; color: var(--text2); }
.hero-meta-item span { color: var(--text); font-weight: 600; }

.quick-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1.25rem;
}

.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
}

.recent-session {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border);
}
.recent-session:last-child { border-bottom: none; }
.recent-left { display: flex; flex-direction: column; gap: 0.2rem; }
.recent-game { font-size: 0.875rem; font-weight: 500; }
.recent-meta { font-size: 0.75rem; color: var(--text3); }
.recent-profit { font-size: 1rem; font-weight: 700; }

.streak-badge {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.3rem 0.75rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
}
.streak-badge.win { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,212,170,0.2); }
.streak-badge.loss { background: var(--red-dim); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }

/* ===== GOALS ===== */
.goal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.goal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
.goal-title { font-size: 0.9rem; font-weight: 600; }
.goal-meta { font-size: 0.78rem; color: var(--text3); margin-top: 0.15rem; }
.goal-right { text-align: right; }

<script>
// ===== STORE =====
const SK = 'pokerSessions_v2';
const GK = 'pokerGoals_v2';
const BK = 'pokerBankroll_v2';
const LK = 'pokerLive_v2';

function getSessions() {
  try { return JSON.parse(localStorage.getItem(SK)) || []; } catch { return []; }
}
function saveSessions(s) { localStorage.setItem(SK, JSON.stringify(s)); }
function addSession(s) { const arr = getSessions(); s.id = crypto.randomUUID(); arr.push(s); saveSessions(arr); return arr; }
function updateSession(id, updates) {
  const arr = getSessions();
  const i = arr.findIndex(s => s.id === id);
  if (i === -1) return arr;
  arr[i] = { ...arr[i], ...updates };
  saveSessions(arr); return arr;
}
function deleteSession(id) { const arr = getSessions().filter(s => s.id !== id); saveSessions(arr); return arr; }
function clearAll() { localStorage.removeItem(SK); }

function getGoals() { try { return JSON.parse(localStorage.getItem(GK)) || {}; } catch { return {}; } }
function saveGoals(g) { localStorage.setItem(GK, JSON.stringify(g)); }

function getBankroll() { return parseFloat(localStorage.getItem(BK)) || 0; }
function saveBankroll(v) { localStorage.setItem(BK, String(v)); }

function getLive() { try { return JSON.parse(localStorage.getItem(LK)) || null; } catch { return null; } }
function saveLive(v) { if (v) localStorage.setItem(LK, JSON.stringify(v)); else localStorage.removeItem(LK); }

// ===== XML HAND HISTORY PARSER =====
async function parseXMLSessions(zip, xmlEntries) {
  const parseAmt = (s) => parseFloat((s || '0').replace(/[^0-9.-]/g, '')) || 0;

  const parseDateTime = (s) => {
    // "03-22-2026 14:43:33"
    const m = s && s.match(/(\d{2})-(\d{2})-(\d{4})\s+(\d{2}):(\d{2}):(\d{2})/);
    if (!m) return null;
    return new Date(`${m[3]}-${m[1]}-${m[2]}T${m[4]}:${m[5]}:${m[6]}`);
  };

  const sessions = [];

  for (const entry of xmlEntries) {
    try {
      const text = await entry.async('string');
      const doc = new DOMParser().parseFromString(text, 'text/xml');

      const gen = doc.querySelector('session > general');
      if (!gen) continue;

      const get = (tag) => gen.querySelector(tag)?.textContent?.trim() || '';

      const nickname  = get('nickname');
      const gametype  = get('gametype');
      const startStr  = get('startdate');
      const bets      = parseAmt(get('bets'));
      const wins      = parseAmt(get('wins'));
      const tablesize = get('tablesize');
      const currency  = get('currency');

      // Date: "03-22-2026 14:43:33" → "2026-03-22"
      const dm = startStr.match(/(\d{2})-(\d{2})-(\d{4})/);
      const date = dm ? `${dm[3]}-${dm[1]}-${dm[2]}` : '';
      if (!date) continue;

      // Extract stakes from gametype string e.g. "Omaha PL €0.25/€0.50"
      const stakeMatch = gametype.match(/[\€\$\£]?([\d.]+)\/[\€\$\£]?([\d.]+)/);
      const stakes = stakeMatch ? `${stakeMatch[1]}/${stakeMatch[2]}` : '';

      // Normalise game type label
      let gameType = gametype;
      const gt = gametype.toLowerCase();
      if (gt.includes('omaha') && gt.includes('hi')) gameType = 'PLO Hi/Lo';
      else if (gt.includes('omaha')) gameType = 'PLO';
      else if (gt.includes('hold')) gameType = "NL Hold'em";
      else if (gt.includes('stud')) gameType = 'Stud';

      // Buy-in = initial stack from first hand for this player
      const games = doc.querySelectorAll('game');
      let buyIn = 0;
      if (games.length > 0 && nickname) {
        const firstPlayer = games[0].querySelector(`players player[name="${nickname}"]`);
        buyIn = parseAmt(firstPlayer?.getAttribute('chips') || '0');
      }
      if (!buyIn) buyIn = bets; // fallback

      const cashOut = Math.max(0, Math.round((buyIn + (wins - bets)) * 100) / 100);
      buyIn = Math.round(buyIn * 100) / 100;

      // Duration: first game start → last game start + small buffer
      let duration = 0;
      if (games.length > 1) {
        const lastStart = games[games.length - 1].querySelector('general startdate')?.textContent?.trim();
        const t1 = parseDateTime(startStr);
        const t2 = parseDateTime(lastStart);
        if (t1 && t2 && t2 > t1) {
          duration = Math.max(0.25, Math.round(((t2 - t1) / 3600000 + 0.1) * 4) / 4);
        }
      }
      if (!duration) duration = Math.max(0.25, Math.round(games.length / 30 * 4) / 4);

      // Total rake, showdown winnings, non-showdown winnings per session
      let totalRake = 0, showdownWin = 0, nonShowdownWin = 0;
      if (nickname) {
        games.forEach(game => {
          const p = game.querySelector(`players player[name="${nickname}"]`);
          if (!p) return;
          totalRake += parseAmt(p.getAttribute('rakeamount') || '0');
          const win = parseAmt(p.getAttribute('win') || '0');
          const bet = parseAmt(p.getAttribute('bet') || '0');
          const net = win - bet;
          // Winamax: showdown round present when cards go to showdown
          const hasShowdown = !!game.querySelector('round[id="showdown"]');
          if (hasShowdown) showdownWin += net;
          else nonShowdownWin += net;
        });
      }
      totalRake = Math.round(totalRake * 100) / 100;
      showdownWin = Math.round(showdownWin * 100) / 100;
      nonShowdownWin = Math.round(nonShowdownWin * 100) / 100;

      sessions.push({
        date,
        location: 'Online',
        gameType,
        stakes,
        buyIn,
        cashOut,
        duration,
        tableSize: tablesize,
        tags: 'Online',
        mood: 3,
        rake: totalRake,
        hands: games.length,
        showdownWin,
        nonShowdownWin,
        notes: `${games.length} hands · ${currency} · rake €${totalRake}`,
      });
    } catch (e) { /* skip malformed file */ }
  }

  return sessions;
}

// ===== CSV =====
const CSV_HEADERS = ['date','location','gameType','stakes','buyIn','cashOut','duration','mood','tags','notes'];
function exportToCSV(sessions) {
  const rows = [CSV_HEADERS.join(',')];
  for (const s of sessions) {
    const row = CSV_HEADERS.map(h => {
      const val = s[h] ?? '';
      const str = String(val);
      return str.includes(',') || str.includes('"') || str.includes('\n') ? '"' + str.replace(/"/g, '""') + '"' : str;
    });
    rows.push(row.join(','));
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'poker-sessions-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
}
function importCSV(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const lines = text.split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) { resolve({ sessions: [], errors: ['Empty file'] }); return; }
      const header = lines[0].toLowerCase();
      const start = header.includes('date') ? 1 : 0;
      const sessions = [], errors = [];
      for (let i = start; i < lines.length; i++) {
        const f = lines[i].split(',');
        if (f.length < 5) { errors.push('Row ' + (i+1) + ': not enough fields'); continue; }
        const buyIn = parseFloat(f[4] || f[3]);
        const cashOut = parseFloat(f[5] || f[4]);
        if (!f[0] || isNaN(buyIn) || isNaN(cashOut)) { errors.push('Row ' + (i+1) + ': invalid data'); continue; }
        sessions.push({ date: f[0].trim(), location: (f[1]||'').trim(), gameType: (f[2]||'').trim(), stakes: (f[3]||'').trim(), buyIn, cashOut, duration: parseFloat(f[6])||0, notes: (f[9]||f[6]||'').trim() });
      }
      resolve({ sessions, errors });
    };
    reader.onerror = () => reject(new Error('Failed to read'));
    reader.readAsText(file);
  });
}

// ===== STATE =====
let currentView = 'dashboard';
let editingId = null;
let bulkMode = false;
let selectedIds = new Set();
let currentPage = 1;
let pageSize = 50;
let groupMode = null; // null | 'day' | 'week' | 'month'
let collapsedDays = new Set();
let sortCol = 'date', sortAsc = false;
let activeCharts = [];
let liveTimer = null;
let sessionMood = 3;
let sessionTags = [];
const TAGS = ['Live', 'Online', 'Home Game', 'Tournament', 'Cash Game', 'Tilt', 'Best Game', 'Bad Beat', 'Deep Run', 'Rebuy'];
const GAME_TYPES = ["NL Hold'em","PLO","PLO5","NL Hold'em 6-Max","PLO Hi/Lo","Stud","Mixed","Tournament","Sit & Go","Bounty","Deep Stack"];
const STAKES_LIST = ["1/2","1/3","2/5","5/10","10/25","25/50","0.25/0.5","0.5/1","Freeroll","$10","$20","$50","$100","$200","$500"];

// ===== UTILS =====
function fmt(v, sign = true) {
  if (v === null || v === undefined) return '-';
  const s = sign && v > 0 ? '+' : '';
  return s + '$' + Math.abs(v).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
}
function fmtHr(v) { return (v >= 0 ? '+' : '') + '$' + Math.abs(v).toFixed(2) + '/hr'; }
function cls(v) { return v > 0 ? 'positive' : v < 0 ? 'negative' : ''; }
function pill(v) { return `<span class="profit-pill ${v >= 0 ? 'pos' : 'neg'}">${fmt(v)}</span>`; }
function moodEmoji(m) { return ['😴','😐','🙂','😊','🔥'][m - 1] || '🙂'; }

function calcStats(sessions) {
  if (!sessions.length) return null;
  const profits = sessions.map(s => s.cashOut - s.buyIn);
  const totalProfit = profits.reduce((a, b) => a + b, 0);
  const totalHours = sessions.reduce((s, x) => s + (x.duration || 0), 0);
  const totalBuyIn = sessions.reduce((s, x) => s + x.buyIn, 0);
  const wins = sessions.filter(s => s.cashOut > s.buyIn).length;
  const losses = sessions.filter(s => s.cashOut < s.buyIn).length;
  const hourly = totalHours > 0 ? totalProfit / totalHours : 0;
  const avgSession = totalProfit / sessions.length;
  const biggestWin = Math.max(...profits);
  const biggestLoss = Math.min(...profits);

  // Streak
  const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));
  let streak = 0, streakType = null;
  for (let i = sorted.length - 1; i >= 0; i--) {
    const p = sorted[i].cashOut - sorted[i].buyIn;
    const t = p > 0 ? 'win' : p < 0 ? 'loss' : null;
    if (t === null) break;
    if (streakType === null) { streakType = t; streak = 1; }
    else if (t === streakType) streak++;
    else break;
  }

  // BB/hr estimate
  const bbSessions = sessions.filter(s => s.stakes && s.stakes.includes('/'));
  let bbhr = null;
  if (bbSessions.length > 0 && totalHours > 0) {
    const totalBB = bbSessions.reduce((sum, s) => {
      const parts = s.stakes.split('/');
      const bb = parseFloat(parts[1]) || 1;
      return sum + (s.cashOut - s.buyIn) / bb;
    }, 0);
    const hours = bbSessions.reduce((s, x) => s + (x.duration || 0), 0);
    if (hours > 0) bbhr = totalBB / hours;
  }

  const totalRake = sessions.reduce((s, x) => s + (x.rake || 0), 0);
  const totalHands = sessions.reduce((s, x) => s + (x.hands || 0), 0);
  const rakePerHour = totalHours > 0 ? totalRake / totalHours : 0;
  const grossProfit = totalProfit + totalRake; // what you'd have won without rake

  return { totalProfit, totalHours, totalBuyIn, wins, losses, winRate: (wins / sessions.length * 100).toFixed(1), hourly, avgSession, biggestWin, biggestLoss, streak, streakType, bbhr, count: sessions.length, roi: totalBuyIn > 0 ? (totalProfit / totalBuyIn * 100).toFixed(1) : 0, totalRake, totalHands, rakePerHour, grossProfit };
}

// ===== NAVIGATION =====
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  const titles = { dashboard: 'Dashboard', sessions: 'Log Session', analytics: 'Analytics', live: 'Live Session', goals: 'Goals', leaks: 'Leak Finder', handlogger: 'Hand Logger' };
  document.getElementById('topbar-title').textContent = titles[view] || view;
  const content = document.getElementById('content');
  content.innerHTML = '';
  activeCharts.forEach(c => c.destroy()); activeCharts = [];
  if (view === 'dashboard') renderDashboard(content);
  else if (view === 'sessions') renderSessionsView(content);
  else if (view === 'analytics') renderAnalyticsView(content);
  else if (view === 'live') renderLiveView(content);
  else if (view === 'goals') renderGoalsView(content);
  else if (view === 'leaks') renderLeakFinderView(content);
  else if (view === 'handlogger') renderHandLoggerView(content);
}

function toggleLiveNav() { switchView('live'); }

function updateLiveBadge() {
  const live = getLive();
  const badge = document.getElementById('live-toggle');
  const label = document.getElementById('live-toggle-label');
  if (live) {
    badge.classList.add('active');
    const elapsed = Math.floor((Date.now() - live.startTime) / 1000);
    label.textContent = '● LIVE ' + fmtTimer(elapsed);
  } else {
    badge.classList.remove('active');
    label.textContent = 'No Live Session';
  }
}

function fmtTimer(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function renderTable(sessions, search = '') {
  let filtered = sessions;
  if (search) {
    const q = search.toLowerCase();
    filtered = sessions.filter(s => (s.date||'').includes(q) || (s.location||'').toLowerCase().includes(q) || (s.gameType||'').toLowerCase().includes(q) || (s.stakes||'').includes(q) || (s.notes||'').toLowerCase().includes(q));
  }

  const sorted = [...filtered].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'profit') { va = a.cashOut - a.buyIn; vb = b.cashOut - b.buyIn; }
    if (sortCol === 'hourly') { va = a.duration > 0 ? (a.cashOut - a.buyIn) / a.duration : 0; vb = b.duration > 0 ? (b.cashOut - b.buyIn) / b.duration : 0; }
    if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
    return sortAsc ? String(va||'').localeCompare(String(vb||'')) : String(vb||'').localeCompare(String(va||''));
  });

  const cols = [
    { key: 'date', label: 'Date' }, { key: 'location', label: 'Location' },
    { key: 'gameType', label: 'Game' }, { key: 'stakes', label: 'Stakes' },
    { key: 'buyIn', label: 'Buy-in' }, { key: 'cashOut', label: 'Cash-out' },
    { key: 'profit', label: 'Profit' }, { key: 'duration', label: 'Hours' },
    { key: 'hourly', label: '$/hr' },
  ];
  const arrow = k => sortCol === k ? (sortAsc ? ' ▲' : ' ▼') : '';

  if (sorted.length === 0) return `<div class="empty-state" style="padding:2rem"><div class="empty-sub">No sessions match your search</div></div>`;

  // GROUP mode (day / week / month)
  if (groupMode && !bulkMode) {
    function getGroupKey(s) {
      if (!s.date) return 'Unknown';
      if (groupMode === 'day') return s.date;
      if (groupMode === 'week') {
        const d = new Date(s.date + 'T12:00:00');
        const day = d.getDay() === 0 ? 6 : d.getDay() - 1; // Mon=0
        const mon = new Date(d); mon.setDate(d.getDate() - day);
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
        return mon.toISOString().slice(0, 10) + '_' + sun.toISOString().slice(0, 10);
      }
      if (groupMode === 'month') return s.date.slice(0, 7);
      return s.date;
    }
    function getGroupLabel(key) {
      if (groupMode === 'day') {
        return new Date(key + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      }
      if (groupMode === 'week') {
        const [from, to] = key.split('_');
        const fd = new Date(from + 'T12:00:00'), td = new Date(to + 'T12:00:00');
        return fd.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' – ' + td.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      }
      if (groupMode === 'month') {
        const [y, m] = key.split('-');
        return new Date(parseInt(y), parseInt(m) - 1, 1).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
      }
      return key;
    }

    const groups = {};
    sorted.forEach(s => { const k = getGroupKey(s); if (!groups[k]) groups[k] = []; groups[k].push(s); });
    const keys = Object.keys(groups).sort((a, b) => sortAsc ? a.localeCompare(b) : b.localeCompare(a));

    const totalPages = Math.ceil(keys.length / pageSize);
    currentPage = Math.min(currentPage, Math.max(1, totalPages));
    const start = (currentPage - 1) * pageSize;
    const pageKeys = keys.slice(start, start + pageSize);

    const pageNums = [];
    if (totalPages <= 7) { for (let i = 1; i <= totalPages; i++) pageNums.push(i); }
    else {
      pageNums.push(1);
      if (currentPage > 3) pageNums.push('...');
      for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pageNums.push(i);
      if (currentPage < totalPages - 2) pageNums.push('...');
      pageNums.push(totalPages);
    }

    const unitLabel = groupMode === 'day' ? 'days' : groupMode === 'week' ? 'weeks' : 'months';
    const pageSizeOpts = groupMode === 'day' ? [7,14,30,60] : groupMode === 'week' ? [4,8,13,26] : [3,6,12,24];

    const paginationBar = `
      <div class="pagination-bar">
        <div class="pagination-info">Showing <strong>${start + 1}–${Math.min(start + pageSize, keys.length)}</strong> of <strong>${keys.length}</strong> ${unitLabel}</div>
        <div class="pagination-controls">
          <button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>
          ${pageNums.map(p => p === '...' ? `<span class="page-ellipsis">…</span>` : `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`).join('')}
          <button class="page-btn" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>
        </div>
        <div class="pagination-size">
          <select id="page-size-select">${pageSizeOpts.map(n => `<option value="${n}" ${n === pageSize ? 'selected' : ''}>${n} ${unitLabel} / page</option>`).join('')}</select>
        </div>
      </div>`;

    const cols = [
      { label: 'Date' }, { label: 'Location' }, { label: 'Game' }, { label: 'Stakes' },
      { label: 'Buy-in' }, { label: 'Cash-out' }, { label: 'Profit' }, { label: 'Hours' }, { label: '€/hr' },
    ];

    let html = `<div class="table-wrapper"><table>`;
    pageKeys.forEach(key => {
      const grpSessions = groups[key];
      const grpProfit = grpSessions.reduce((s, x) => s + (x.cashOut - x.buyIn), 0);
      const grpHours = grpSessions.reduce((s, x) => s + (x.duration || 0), 0);
      const isOpen = !collapsedDays.has(key);
      const label = getGroupLabel(key);

      html += `
        <thead>
          <tr class="day-group-header" data-date="${key}">
            <th colspan="11" class="day-group-th">
              <div class="day-group-row">
                <div class="day-group-left">
                  <span class="day-toggle">${isOpen ? '▼' : '▶'}</span>
                  <span class="day-date">${label}</span>
                  <span class="day-count">${grpSessions.length} session${grpSessions.length > 1 ? 's' : ''}</span>
                </div>
                <div class="day-group-right">
                  <span class="day-hours">${grpHours > 0 ? grpHours.toFixed(1) + 'h' : ''}</span>
                  <span class="day-profit ${grpProfit > 0 ? 'positive' : grpProfit < 0 ? 'negative' : ''}">${grpProfit >= 0 ? '+' : ''}€${Math.abs(grpProfit).toFixed(0)}</span>
                </div>
              </div>
            </th>
          </tr>
        </thead>`;

      if (isOpen) {
        html += `<thead><tr class="day-cols-header">`;
        cols.forEach(c => { html += `<th>${c.label}</th>`; });
        html += `<th>Mood</th><th>Notes</th><th></th></tr></thead>`;
        html += `<tbody>`;
        grpSessions.forEach(s => {
          const p = s.cashOut - s.buyIn;
          const hr = s.duration > 0 ? p / s.duration : null;
          html += `<tr>
            <td>${s.date}</td>
            <td>${s.location || '<span style="color:var(--text3)">-</span>'}</td>
            <td>${s.gameType || '<span style="color:var(--text3)">-</span>'}</td>
            <td>${s.stakes ? `<span class="badge badge-blue">${s.stakes}</span>` : '<span style="color:var(--text3)">-</span>'}</td>
            <td>€${s.buyIn.toLocaleString()}</td>
            <td>€${s.cashOut.toLocaleString()}</td>
            <td>${pill(p)}</td>
            <td>${s.duration || '<span style="color:var(--text3)">-</span>'}</td>
            <td class="${cls(hr)}">${hr !== null ? fmtHr(hr) : '<span style="color:var(--text3)">-</span>'}</td>
            <td>${s.mood ? moodEmoji(s.mood) : ''}</td>
            <td class="notes-cell" title="${(s.notes||'').replace(/"/g,'&quot;')}">${s.notes || '<span style="color:var(--text3)">-</span>'}</td>
            <td class="action-cell">
              <button class="btn-icon edit-btn" data-id="${s.id}" title="Edit">&#9998;</button>
              <button class="btn-icon delete-btn" data-id="${s.id}" title="Delete">&#10005;</button>
            </td>
          </tr>`;
        });
        html += `</tbody>`;
      }
    });

    html += `</table></div>${paginationBar}`;
    return html;
  }

  // Pagination
  const totalPages = Math.ceil(sorted.length / pageSize);
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage - 1) * pageSize;
  const paginated = bulkMode ? sorted : sorted.slice(start, start + pageSize);

  // Page numbers to show (max 7 buttons)
  const pageNums = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pageNums.push(i);
  } else {
    pageNums.push(1);
    if (currentPage > 3) pageNums.push('...');
    for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pageNums.push(i);
    if (currentPage < totalPages - 2) pageNums.push('...');
    pageNums.push(totalPages);
  }

  const paginationBar = bulkMode ? '' : `
    <div class="pagination-bar">
      <div class="pagination-info">
        Showing <strong>${start + 1}–${Math.min(start + pageSize, sorted.length)}</strong> of <strong>${sorted.length}</strong> sessions
      </div>
      <div class="pagination-controls">
        <button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>
        ${pageNums.map(p => p === '...'
          ? `<span class="page-ellipsis">…</span>`
          : `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`
        ).join('')}
        <button class="page-btn" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>
      </div>
      <div class="pagination-size">
        <select id="page-size-select">
          ${[25, 50, 100, 200].map(n => `<option value="${n}" ${n === pageSize ? 'selected' : ''}>${n} / page</option>`).join('')}
        </select>
      </div>
    </div>`;

  let html = `<div class="table-wrapper"><table><thead><tr>`;
  if (bulkMode) html += `<th><input type="checkbox" id="bulk-check-all" title="Select all visible"></th>`;
  cols.forEach(c => { html += `<th class="sortable" data-sort="${c.key}">${c.label}${arrow(c.key)}</th>`; });
  html += `<th>Mood</th><th>Notes</th>${bulkMode ? '' : '<th></th>'}</tr></thead><tbody>`;

  paginated.forEach(s => {
    const p = s.cashOut - s.buyIn;
    const hr = s.duration > 0 ? p / s.duration : null;
    const checked = selectedIds.has(s.id) ? 'checked' : '';
    const rowStyle = selectedIds.has(s.id) ? 'background:rgba(244,63,94,0.07)' : '';
    html += `<tr style="${rowStyle}">
      ${bulkMode ? `<td><input type="checkbox" class="bulk-checkbox" data-id="${s.id}" ${checked}></td>` : ''}
      <td>${s.date}</td>
      <td>${s.location || '<span style="color:var(--text3)">-</span>'}</td>
      <td>${s.gameType || '<span style="color:var(--text3)">-</span>'}</td>
      <td>${s.stakes ? `<span class="badge badge-blue">${s.stakes}</span>` : '<span style="color:var(--text3)">-</span>'}</td>
      <td>€${s.buyIn.toLocaleString()}</td>
      <td>€${s.cashOut.toLocaleString()}</td>
      <td>${pill(p)}</td>
      <td>${s.duration || '<span style="color:var(--text3)">-</span>'}</td>
      <td class="${cls(hr)}">${hr !== null ? fmtHr(hr) : '<span style="color:var(--text3)">-</span>'}</td>
      <td>${s.mood ? moodEmoji(s.mood) : ''}</td>
      <td class="notes-cell" title="${(s.notes||'').replace(/"/g,'&quot;')}">${s.notes || '<span style="color:var(--text3)">-</span>'}</td>
      ${bulkMode ? '' : `<td class="action-cell">
        <button class="btn-icon edit-btn" data-id="${s.id}" title="Edit">&#9998;</button>
        <button class="btn-icon delete-btn" data-id="${s.id}" title="Delete">&#10005;</button>
      </td>`}
    </tr>`;
  });

  html += `</tbody></table></div>${paginationBar}`;
  return html;
}

function bindSessionEvents(container) {
  const wrapper = container.querySelector('#session-form-wrapper');
  sessionMood = 3; sessionTags = [];

  function setupFormEvents() {
    const form = container.querySelector('#session-form');
    if (!form) return;

    // Mood
    container.querySelectorAll('.mood-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        sessionMood = parseInt(btn.dataset.mood);
        container.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });

    // Tags
    container.querySelectorAll('.tag-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        chip.classList.toggle('selected');
        const tag = chip.dataset.tag;
        if (chip.classList.contains('selected')) sessionTags.push(tag);
        else sessionTags = sessionTags.filter(t => t !== tag);
      });
    });

    // Existing tags from edit
    sessionTags = [...container.querySelectorAll('.tag-chip.selected')].map(c => c.dataset.tag);
    const moodSel = container.querySelector('.mood-btn.selected');
    if (moodSel) sessionMood = parseInt(moodSel.dataset.mood);

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = {
        date: form.querySelector('#f-date').value,
        location: form.querySelector('#f-location').value.trim(),
        gameType: form.querySelector('#f-gameType').value.trim(),
        stakes: form.querySelector('#f-stakes').value.trim(),
        buyIn: parseFloat(form.querySelector('#f-buyIn').value) || 0,
        cashOut: parseFloat(form.querySelector('#f-cashOut').value) || 0,
        duration: parseFloat(form.querySelector('#f-duration').value) || 0,
        tableSize: form.querySelector('#f-tableSize').value,
        mood: sessionMood,
        tags: sessionTags.join(','),
        notes: form.querySelector('#f-notes').value.trim(),
      };
      if (editingId) { updateSession(editingId, data); editingId = null; }
      else { addSession(data); }
      renderSessionsView(container);
    });

    const cancelBtn = form.querySelector('#cancel-btn');
    if (cancelBtn) {
      cancelBtn.addEventListener('click', () => { editingId = null; renderSessionsView(container); });
    }
  }

  setupFormEvents();

  // Search
  container.querySelector('#session-search').addEventListener('input', (e) => {
    currentPage = 1;
    container.querySelector('#sessions-table-wrapper').innerHTML = renderTable(getSessions(), e.target.value);
    bindTableEvents(container);
  });

  function bindTableEvents(c) {
    c.querySelectorAll('.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (sortCol === key) sortAsc = !sortAsc;
        else { sortCol = key; sortAsc = false; }
        const search = c.querySelector('#session-search')?.value || '';
        c.querySelector('#sessions-table-wrapper').innerHTML = renderTable(getSessions(), search);
        bindTableEvents(c);
      });
    });

    c.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const session = getSessions().find(s => s.id === btn.dataset.id);
        if (!session) return;
        editingId = session.id;
        const locs = [...new Set(getSessions().map(s => s.location).filter(Boolean))];
        wrapper.innerHTML = buildSessionForm(session, locs);
        setupFormEvents();
        wrapper.scrollIntoView({ behavior: 'smooth' });
      });
    });

    c.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Delete this session?')) { deleteSession(btn.dataset.id); renderSessionsView(c); }
      });
    });

    // Pagination
    c.querySelectorAll('.page-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = parseInt(btn.dataset.page);
        if (!isNaN(p) && p >= 1) {
          currentPage = p;
          const search = c.querySelector('#session-search')?.value || '';
          c.querySelector('#sessions-table-wrapper').innerHTML = renderTable(getSessions(), search);
          bindTableEvents(c);
          c.querySelector('#sessions-table-wrapper').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    const pageSizeEl = c.querySelector('#page-size-select');
    if (pageSizeEl) {
      pageSizeEl.addEventListener('change', () => {
        pageSize = parseInt(pageSizeEl.value);
        currentPage = 1;
        const search = c.querySelector('#session-search')?.value || '';
        c.querySelector('#sessions-table-wrapper').innerHTML = renderTable(getSessions(), search);
        bindTableEvents(c);
      });
    }

    c.querySelectorAll('.day-group-header').forEach(row => {
      row.addEventListener('click', () => {
        const date = row.dataset.date;
        if (collapsedDays.has(date)) collapsedDays.delete(date);
        else collapsedDays.add(date);
        const search = c.querySelector('#session-search')?.value || '';
        c.querySelector('#sessions-table-wrapper').innerHTML = renderTable(getSessions(), search);
        bindTableEvents(c);
      });
    });
  }

  bindTableEvents(container);

  async function handleImportFile(file) {
    if (!file) return;
    try {
      let csvFile = file;

      const isZip = file.name.endsWith('.zip') || file.type === 'application/zip' || file.type === 'application/x-zip-compressed';

      if (isZip) {
        const zip = await JSZip.loadAsync(file);
        const entries = Object.values(zip.files).filter(f => !f.dir);

        const xmlEntries = entries.filter(f => f.name.endsWith('.xml'));
        const csvEntry = entries.find(f => f.name.endsWith('.csv'));

        if (xmlEntries.length > 0) {
          // Parse XML hand history files (Winamax / similar format)
          const sessions = await parseXMLSessions(zip, xmlEntries);
          if (sessions.length === 0) { alert('Could not parse any sessions from the XML files.'); return; }
          const store = getSessions();
          sessions.forEach(s => { s.id = crypto.randomUUID(); store.push(s); });
          saveSessions(store);
          alert('Imported ' + sessions.length + ' sessions from ' + xmlEntries.length + ' hand history files.');
          renderSessionsView(container);
          return;
        } else if (csvEntry) {
          const csvText = await csvEntry.async('string');
          csvFile = new File([csvText], csvEntry.name, { type: 'text/csv' });
        } else {
          alert('No supported files found in the zip (expected .xml or .csv).');
          return;
        }
      }

      const { sessions, errors } = await importCSV(csvFile);
      if (errors.length > 0) alert('Warnings:\n' + errors.join('\n'));
      const store = getSessions();
      sessions.forEach(s => { s.id = crypto.randomUUID(); store.push(s); });
      saveSessions(store);
      alert('Imported ' + sessions.length + ' sessions');
      renderSessionsView(container);
    } catch (err) { alert('Import failed: ' + err.message); }
  }

  const dropZone = container.querySelector('#csv-drop-zone');
  const dropLabel = container.querySelector('#csv-drop-label');
  const csvInput = container.querySelector('#csv-input');

  dropZone.addEventListener('click', () => csvInput.click());
  csvInput.addEventListener('change', (e) => handleImportFile(e.target.files[0]));

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); dropLabel.textContent = '📂 Drop here'; });
  dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); dropLabel.textContent = '⬆ Import CSV'; });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    dropLabel.textContent = '⬆ Import CSV';
    handleImportFile(e.dataTransfer.files[0]);
  });
  container.querySelector('#export-btn').addEventListener('click', () => exportToCSV(getSessions()));
  container.querySelector('#clear-btn').addEventListener('click', () => {
    if (confirm('Delete ALL sessions? This cannot be undone.')) { clearAll(); renderSessionsView(container); }
  });

  // ── Bulk select ──────────────────────────────────────────────
  function updateBulkCount() {
    const countEl = container.querySelector('#bulk-count');
    const deleteBtn = container.querySelector('#bulk-delete-btn');
    if (countEl) countEl.textContent = selectedIds.size + ' selected';
    if (deleteBtn) deleteBtn.disabled = selectedIds.size === 0;
  }

  function refreshTableBulk() {
    const search = container.querySelector('#session-search')?.value || '';
    container.querySelector('#sessions-table-wrapper').innerHTML = renderTable(getSessions(), search);
    bindTableEvents(container);
    bindBulkCheckboxes();
    updateBulkCount();
  }

  function selectByFilter(filter) {
    const all = getSessions();
    selectedIds.clear();
    all.forEach(s => {
      if (filter === 'all') selectedIds.add(s.id);
      else if (filter === 'none') { /* clear */ }
      else if (filter.startsWith('year-')) { if (s.date && s.date.startsWith(filter.slice(5))) selectedIds.add(s.id); }
      else if (filter === 'online') { if ((s.location || '').toLowerCase() === 'online') selectedIds.add(s.id); }
    });
    refreshTableBulk();
  }

  function bindBulkCheckboxes() {
    const checkAll = container.querySelector('#bulk-check-all');
    if (checkAll) {
      checkAll.checked = false;
      checkAll.addEventListener('change', () => {
        container.querySelectorAll('.bulk-checkbox').forEach(cb => {
          cb.checked = checkAll.checked;
          if (checkAll.checked) selectedIds.add(cb.dataset.id);
          else selectedIds.delete(cb.dataset.id);
        });
        updateBulkCount();
      });
    }
    container.querySelectorAll('.bulk-checkbox').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) selectedIds.add(cb.dataset.id);
        else selectedIds.delete(cb.dataset.id);
        updateBulkCount();
      });
    });
  }

  ['day', 'week', 'month'].forEach(mode => {
    const btn = container.querySelector(`#group-${mode}-btn`);
    if (!btn) return;
    btn.addEventListener('click', () => {
      groupMode = groupMode === mode ? null : mode;
      collapsedDays.clear();
      currentPage = 1;
      // reset pageSize to sensible default for mode
      pageSize = mode === 'week' ? 4 : mode === 'month' ? 6 : 50;
      const search = container.querySelector('#session-search')?.value || '';
      container.querySelector('#sessions-table-wrapper').innerHTML = renderTable(getSessions(), search);
      ['day','week','month'].forEach(m => {
        const b = container.querySelector(`#group-${m}-btn`);
        if (b) b.classList.toggle('active', groupMode === m);
      });
      bindTableEvents(container);
    });
  });

  container.querySelector('#bulk-btn').addEventListener('click', () => {
    bulkMode = true;
    selectedIds.clear();
    container.querySelector('#bulk-toolbar').style.display = 'flex';
    container.querySelector('#bulk-btn').style.display = 'none';
    refreshTableBulk();
  });

  container.querySelector('#bulk-cancel').addEventListener('click', () => {
    bulkMode = false;
    selectedIds.clear();
    container.querySelector('#bulk-toolbar').style.display = 'none';
    container.querySelector('#bulk-btn').style.display = '';
    refreshTableBulk();
  });

  container.querySelectorAll('[data-bulk-filter]').forEach(btn => {
    btn.addEventListener('click', () => selectByFilter(btn.dataset.bulkFilter));
  });

  container.querySelector('#bulk-date-select').addEventListener('click', () => {
    const from = container.querySelector('#bulk-from').value;
    const to   = container.querySelector('#bulk-to').value;
    if (!from && !to) { alert('Pick at least one date.'); return; }
    selectedIds.clear();
    getSessions().forEach(s => {
      if ((!from || s.date >= from) && (!to || s.date <= to)) selectedIds.add(s.id);
    });
    refreshTableBulk();
  });

  container.querySelector('#bulk-delete-btn').addEventListener('click', () => {
    if (selectedIds.size === 0) return;
    if (!confirm(`Delete ${selectedIds.size} selected sessions? This cannot be undone.`)) return;
    const remaining = getSessions().filter(s => !selectedIds.has(s.id));
    saveSessions(remaining);
    bulkMode = false;
    selectedIds.clear();
    renderSessionsView(container);
  });
}

  const sessions = getSessions();

  container.innerHTML = `

      <div class="filter-group"><label>From</label><input type="date" id="f-from"></div>
      <div class="filter-group"><label>To</label><input type="date" id="f-to"></div>
