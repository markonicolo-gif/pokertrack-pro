      </div>
      <div class="filter-group"><label>Game</label>
        <select id="f-game"><option value="">All</option>${[...new Set(sessions.map(s=>s.gameType).filter(Boolean))].map(g=>`<option value="${g}">${g}</option>`).join('')}</select>
      </div>
      <div class="filter-group"><label>Stakes</label>
        <select id="f-stakes"><option value="">All</option>${[...new Set(sessions.map(s=>s.stakes).filter(Boolean))].map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
      </div>
      <button class="btn btn-secondary btn-sm" id="reset-filters">Reset</button>
    </div>

    <div class="stats-grid" id="stats-grid" style="margin-bottom:1.25rem"></div>

    <div class="charts-grid">
      <div class="chart-card full"><h3>&#128200; Cumulative Profit</h3><canvas id="ch-cum"></canvas></div>
      <div class="chart-card"><h3>&#128197; Monthly Results</h3><canvas id="ch-monthly"></canvas></div>
      <div class="chart-card"><h3>&#128203; Session Distribution</h3><canvas id="ch-dist"></canvas></div>
      <div class="chart-card"><h3>&#128205; Profit by Location</h3><canvas id="ch-loc"></canvas></div>
      <div class="chart-card"><h3>&#127183; Profit by Game Type</h3><canvas id="ch-game"></canvas></div>
      <div class="chart-card"><h3>&#128197; Day of Week</h3><canvas id="ch-dow"></canvas></div>
      <div class="chart-card"><h3>&#9200; Session Length vs Profit</h3><canvas id="ch-scatter"></canvas></div>
      <div class="chart-card"><h3>&#128200; Hourly Rate Trend</h3><canvas id="ch-hrtrend"></canvas></div>
      <div class="chart-card"><h3>&#127968; Rake Paid per Session</h3><canvas id="ch-rake"></canvas></div>
      <div class="chart-card full"><h3>&#128200; Gross vs Net Profit (Rake Impact)</h3><canvas id="ch-gross-net"></canvas></div>
    </div>
  `;

  const apply = () => {
    const from = container.querySelector('#f-from').value;
    const to = container.querySelector('#f-to').value;
    const loc = container.querySelector('#f-loc').value;
    const game = container.querySelector('#f-game').value;
    const stakes = container.querySelector('#f-stakes').value;
    let f = sessions;
    if (from) f = f.filter(s => s.date >= from);
    if (to) f = f.filter(s => s.date <= to);
    if (loc) f = f.filter(s => s.location === loc);
    if (game) f = f.filter(s => s.gameType === game);
    if (stakes) f = f.filter(s => s.stakes === stakes);
    renderAnalyticsStats(container.querySelector('#stats-grid'), f);
    renderAllCharts(container, f);
  };

  container.querySelectorAll('.filters-bar input, .filters-bar select').forEach(el => el.addEventListener('change', apply));
  container.querySelector('#reset-filters').addEventListener('click', () => {
    ['#f-from','#f-to','#f-loc','#f-game','#f-stakes'].forEach(id => { const el = container.querySelector(id); if (el) el.value = ''; });
    apply();
  });
  apply();
}

function renderAnalyticsStats(el, sessions) {
  if (!sessions.length) { el.innerHTML = `<div class="empty-state"><div class="empty-sub">No sessions match the selected filters</div></div>`; return; }
  const s = calcStats(sessions);

  el.innerHTML = `
    ${statCard('Total Profit', fmt(s.totalProfit), cls(s.totalProfit), '&#128176;', 'green', s.count + ' sessions')}
    ${statCard('Win Rate', s.winRate + '%', '', '&#127942;', 'gold', s.wins + 'W / ' + s.losses + 'L')}
    ${statCard('Hourly Rate', fmtHr(s.hourly), cls(s.hourly), '&#9200;', 'blue', s.totalHours.toFixed(1) + ' hours')}
    ${statCard('Avg Session', fmt(s.avgSession), cls(s.avgSession), '&#128201;', s.avgSession >= 0 ? 'green' : 'red', 'per session')}
    ${statCard('Biggest Win', fmt(s.biggestWin), 'positive', '&#127881;', 'green', 'best session')}
    ${statCard('Biggest Loss', fmt(s.biggestLoss), 'negative', '&#128546;', 'red', 'worst session')}
    ${statCard('Total Invested', '$' + s.totalBuyIn.toLocaleString(), 'neutral', '&#128180;', 'purple', 'total buy-ins')}
    ${statCard('ROI', s.roi + '%', cls(parseFloat(s.roi)), '&#128200;', parseFloat(s.roi) >= 0 ? 'green' : 'red', 'return on investment')}
    ${s.bbhr !== null ? statCard('BB/hr', s.bbhr.toFixed(1), cls(s.bbhr), '&#127183;', 'blue', 'big blinds / hour') : ''}
    ${statCard('Streak', s.streak > 0 ? s.streak + '-' + (s.streakType === 'win' ? 'Win 🔥' : 'Loss ❄️') : '-', s.streakType === 'win' ? 'positive' : s.streakType === 'loss' ? 'negative' : '', '&#9889;', s.streakType === 'win' ? 'green' : 'red', 'current streak')}
    ${statCard('Total Rake Paid', '€' + s.totalRake.toFixed(2), 'negative', '&#127968;', 'red', s.totalHands > 0 ? s.totalHands + ' hands' : 'all sessions')}
    ${statCard('Rake / Hour', '€' + s.rakePerHour.toFixed(2) + '/hr', 'negative', '&#9201;', 'red', 'cost of playing')}
    ${statCard('Gross Profit', fmt(s.grossProfit), cls(s.grossProfit), '&#128173;', s.grossProfit >= 0 ? 'green' : 'red', 'before rake')}
  `;
}

function statCard(label, value, valClass, icon, colorClass, sub) {
  return `<div class="stat-card ${colorClass}">
    <div class="stat-icon">${icon}</div>
    <div class="stat-label">${label}</div>
    <div class="stat-value ${valClass}">${value}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

function renderAllCharts(container, sessions) {
  activeCharts.forEach(c => c.destroy()); activeCharts = [];
  if (!sessions.length) return;

  const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));
  const gridOpts = { color: 'rgba(255,255,255,0.05)' };
  const tickOpts = { color: '#64748b', font: { size: 11 } };
  const tooltipDefaults = {
    backgroundColor: 'rgba(13,17,23,0.95)',
    borderColor: 'rgba(255,255,255,0.12)',
    borderWidth: 1,
    titleColor: '#94a3b8',
    bodyColor: '#e2e8f0',
    padding: 10,
    cornerRadius: 8,
    displayColors: false,
    callbacks: {
      label: ctx => {
        const v = ctx.parsed?.y ?? ctx.parsed;
        if (typeof v === 'number') return (v >= 0 ? '+' : '') + '€' + v.toLocaleString('en', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        return String(v);
      }
    }
  };
  const chartDefaults = {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { display: false }, tooltip: tooltipDefaults },
    scales: {
      y: { grid: gridOpts, ticks: { ...tickOpts, callback: v => '€' + v.toLocaleString() } },
      x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: tickOpts }
    }
  };

  // 1. Cumulative Profit
  let cum = 0, cumSD = 0, cumNSD = 0;
  const cumPts = sorted.map(s => { cum += s.cashOut - s.buyIn; return cum; });
  const hasHandData = sorted.some(s => s.showdownWin !== undefined);
  const cumSDPts  = hasHandData ? sorted.map(s => { cumSD  += (s.showdownWin  ?? 0); return Math.round(cumSD  * 100) / 100; }) : null;
  const cumNSDPts = hasHandData ? sorted.map(s => { cumNSD += (s.nonShowdownWin ?? 0); return Math.round(cumNSD * 100) / 100; }) : null;

  // EV line: linear regression through cumulative points
  const n = cumPts.length;
  const xMean = (n - 1) / 2;
  const yMean = cumPts.reduce((a, b) => a + b, 0) / n;
  const slope = cumPts.reduce((s, y, i) => s + (i - xMean) * (y - yMean), 0) /
                cumPts.reduce((s, _, i) => s + (i - xMean) ** 2, 0);
  const intercept = yMean - slope * xMean;
  const evLine = cumPts.map((_, i) => Math.round((intercept + slope * i) * 100) / 100);

  const cumDatasets = [
    { label: 'Net Profit', data: cumPts, borderColor: cumPts[cumPts.length-1] >= 0 ? '#00d4aa' : '#f43f5e', backgroundColor: cumPts[cumPts.length-1] >= 0 ? 'rgba(0,212,170,0.06)' : 'rgba(244,63,94,0.06)', fill: true, tension: 0.3, pointRadius: sorted.length < 30 ? 3 : 0, pointHoverRadius: 5, borderWidth: 2 },
    { label: 'EV (trend)', data: evLine, borderColor: '#f59e0b', backgroundColor: 'transparent', fill: false, tension: 0, pointRadius: 0, pointHoverRadius: 4, borderWidth: 1.5, borderDash: [6, 3] },
    { label: 'Zero', data: sorted.map(() => 0), borderColor: 'rgba(255,255,255,0.08)', borderDash: [4,4], borderWidth: 1, pointRadius: 0, tension: 0 },
  ];
  if (cumSDPts)  cumDatasets.splice(1, 0, { label: 'Showdown',     data: cumSDPts,  borderColor: '#3b82f6', backgroundColor: 'transparent', fill: false, tension: 0.3, pointRadius: 0, pointHoverRadius: 4, borderWidth: 1.5 });
  if (cumNSDPts) cumDatasets.splice(2, 0, { label: 'Non-showdown', data: cumNSDPts, borderColor: '#8b5cf6', backgroundColor: 'transparent', fill: false, tension: 0.3, pointRadius: 0, pointHoverRadius: 4, borderWidth: 1.5 });

  activeCharts.push(new Chart(container.querySelector('#ch-cum'), {
    type: 'line',
    data: { labels: sorted.map(s => s.date), datasets: cumDatasets },
    options: {
      ...chartDefaults,
      plugins: {
        legend: { display: true, labels: { color: '#64748b', font: { size: 11 }, boxWidth: 24, padding: 12, filter: item => item.text !== 'Zero' } },
        tooltip: { ...tooltipDefaults, filter: item => item.dataset.label !== 'Zero', callbacks: {
          title: ctx => ctx[0]?.label || '',
          label: ctx => { const v = ctx.parsed.y; return `${ctx.dataset.label}: ${v >= 0 ? '+' : ''}€${v.toLocaleString('en', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}`; }
        }}
      }
    }
  }));

  // 2. Monthly
  const monthly = {};
  sorted.forEach(s => { const m = s.date.slice(0,7); monthly[m] = (monthly[m]||0) + (s.cashOut - s.buyIn); });
  const mL = Object.keys(monthly), mV = Object.values(monthly);
  activeCharts.push(new Chart(container.querySelector('#ch-monthly'), {
    type: 'bar',
    data: { labels: mL, datasets: [{ data: mV, backgroundColor: mV.map(v => v >= 0 ? 'rgba(0,212,170,0.6)' : 'rgba(244,63,94,0.6)'), borderColor: mV.map(v => v >= 0 ? '#00d4aa' : '#f43f5e'), borderWidth: 1, borderRadius: 4 }] },
    options: chartDefaults
  }));

  // 3. Distribution
  const profits = sessions.map(s => s.cashOut - s.buyIn);
  const mn = Math.min(...profits), mx = Math.max(...profits);
  const bSz = Math.max(50, Math.ceil((mx - mn || 1) / 10 / 50) * 50);
  const bStart = Math.floor(mn / bSz) * bSz;
  const buckets = {};
  for (let b = bStart; b <= mx; b += bSz) buckets[b] = 0;
  profits.forEach(p => { const b = Math.floor(p / bSz) * bSz; buckets[b] = (buckets[b]||0) + 1; });
  const dL = Object.keys(buckets).map(Number).sort((a,b)=>a-b);
  activeCharts.push(new Chart(container.querySelector('#ch-dist'), {
    type: 'bar',
    data: { labels: dL.map(b => '$'+b+'→'), datasets: [{ data: dL.map(b => buckets[b]), backgroundColor: dL.map(b => b >= 0 ? 'rgba(0,212,170,0.6)' : 'rgba(244,63,94,0.6)'), borderRadius: 4 }] },
    options: { ...chartDefaults, scales: { y: { ...chartDefaults.scales.y, ticks: { ...tickOpts, stepSize: 1, callback: v => v } }, x: chartDefaults.scales.x } }
  }));

  // 4. By Location
  const byLoc = {};
  sessions.forEach(s => { const l = s.location||'Unknown'; byLoc[l] = (byLoc[l]||0) + (s.cashOut - s.buyIn); });
  const lL = Object.keys(byLoc), lV = Object.values(byLoc);
  activeCharts.push(new Chart(container.querySelector('#ch-loc'), {
    type: 'bar',
    data: { labels: lL, datasets: [{ data: lV, backgroundColor: lV.map(v => v >= 0 ? 'rgba(0,212,170,0.6)' : 'rgba(244,63,94,0.6)'), borderRadius: 4 }] },
    options: { ...chartDefaults, indexAxis: 'y' }
  }));

  // 5. By Game Type (doughnut)
  const byGame = {};
  sessions.forEach(s => { const g = s.gameType||'Unknown'; byGame[g] = (byGame[g]||0) + (s.cashOut - s.buyIn); });
  const gL = Object.keys(byGame), gV = Object.values(byGame);
  const colors = ['#00d4aa','#3b82f6','#f59e0b','#f43f5e','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16'];
  activeCharts.push(new Chart(container.querySelector('#ch-game'), {
    type: 'doughnut',
    data: { labels: gL, datasets: [{ data: gV.map(Math.abs), backgroundColor: colors, borderWidth: 0, hoverOffset: 8 }] },
    options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#64748b', padding: 12, font: { size: 11 } } }, tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmt(gV[ctx.dataIndex]) } } } }
  }));

  // 6. Day of Week
  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowTotals = Array(7).fill(0), dowCounts = Array(7).fill(0);
  sessions.forEach(s => { const d = new Date(s.date).getDay(); dowTotals[d] += s.cashOut - s.buyIn; dowCounts[d]++; });
  const dowAvg = dowTotals.map((t, i) => dowCounts[i] > 0 ? t / dowCounts[i] : 0);
  activeCharts.push(new Chart(container.querySelector('#ch-dow'), {
    type: 'bar',
    data: { labels: dows, datasets: [{ data: dowAvg, backgroundColor: dowAvg.map(v => v >= 0 ? 'rgba(0,212,170,0.6)' : 'rgba(244,63,94,0.6)'), borderRadius: 4, label: 'Avg Profit' }] },
    options: chartDefaults
  }));

  // 7. Scatter: Duration vs Profit
  const scatterData = sessions.filter(s => s.duration > 0).map(s => ({ x: s.duration, y: s.cashOut - s.buyIn }));
  activeCharts.push(new Chart(container.querySelector('#ch-scatter'), {
    type: 'scatter',
    data: { datasets: [{ data: scatterData, backgroundColor: scatterData.map(p => p.y >= 0 ? 'rgba(0,212,170,0.6)' : 'rgba(244,63,94,0.6)'), pointRadius: 5 }] },
    options: { responsive: true, plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, callbacks: { label: ctx => `${ctx.parsed.x}h → ${ctx.parsed.y >= 0 ? '+' : ''}€${ctx.parsed.y.toLocaleString()}` } } }, scales: { x: { title: { display: true, text: 'Hours', color: '#64748b' }, grid: gridOpts, ticks: tickOpts }, y: { title: { display: true, text: 'Profit (€)', color: '#64748b' }, ticks: { ...tickOpts, callback: v => '€'+v.toLocaleString() }, grid: gridOpts } } }
  }));

  // 8. Hourly Rate Trend (rolling avg)
  const withHours = sorted.filter(s => s.duration > 0);
  const window = Math.max(3, Math.min(10, Math.floor(withHours.length / 4)));
  const hrTrend = withHours.map((s, i) => {
    if (i < window - 1) return null;
    const slice = withHours.slice(i - window + 1, i + 1);
    const tp = slice.reduce((sum, x) => sum + (x.cashOut - x.buyIn), 0);
    const th = slice.reduce((sum, x) => sum + (x.duration || 0), 0);
    return th > 0 ? tp / th : null;
  }).filter(v => v !== null);
  const hrLabels = withHours.slice(window - 1).map(s => s.date);
  activeCharts.push(new Chart(container.querySelector('#ch-hrtrend'), {
    type: 'line',
    data: {
      labels: hrLabels,
      datasets: [
        { data: hrTrend, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.08)', fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2, label: window+'-session rolling avg' },
        { data: hrLabels.map(() => 0), borderColor: 'rgba(255,255,255,0.08)', borderDash: [4,4], borderWidth: 1, pointRadius: 0, tooltip: { enabled: false } }
      ]
    },
    options: { ...chartDefaults, plugins: { ...chartDefaults.plugins, tooltip: { ...tooltipDefaults, filter: item => item.datasetIndex === 0, callbacks: { title: ctx => ctx[0]?.label || '', label: ctx => `€/hr: ${ctx.parsed.y >= 0 ? '+' : ''}€${ctx.parsed.y.toFixed(2)}` } } } }
  }));

  // Rake per session (only sessions with rake data)
  const rakeSessions = sorted.filter(s => s.rake > 0);
  if (rakeSessions.length > 0) {
    activeCharts.push(new Chart(container.querySelector('#ch-rake'), {
      type: 'bar',
      data: {
        labels: rakeSessions.map(s => s.date),
        datasets: [{
          data: rakeSessions.map(s => s.rake),
          backgroundColor: 'rgba(244,63,94,0.55)',
          borderColor: '#f43f5e',
          borderWidth: 1,
          borderRadius: 4,
          label: 'Rake'
        }]
      },
      options: {
        ...chartDefaults,
        scales: {
          y: { grid: gridOpts, ticks: { ...tickOpts, callback: v => '€' + v.toFixed(2) } },
          x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: tickOpts }
        }
      }
    }));

    // Gross vs Net cumulative
    let cumNet = 0, cumGross = 0;
    const gnLabels = sorted.map(s => s.date);
    const netLine = sorted.map(s => { cumNet += s.cashOut - s.buyIn; return cumNet; });
    const grossLine = sorted.map(s => { cumGross += (s.cashOut - s.buyIn) + (s.rake || 0); return cumGross; });

    activeCharts.push(new Chart(container.querySelector('#ch-gross-net'), {
      type: 'line',
      data: {
        labels: gnLabels,
        datasets: [
          { label: 'Net Profit (after rake)', data: netLine, borderColor: '#00d4aa', backgroundColor: 'rgba(0,212,170,0.07)', fill: true, tension: 0.3, pointRadius: sorted.length < 30 ? 3 : 0, borderWidth: 2 },
          { label: 'Gross Profit (before rake)', data: grossLine, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.05)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2, borderDash: [6,3] }
        ]
      },
      options: {
        ...chartDefaults,
        plugins: { legend: { display: true, labels: { color: '#64748b', font: { size: 11 } } } }
      }
    }));
  }
}

// ===== LIVE SESSION =====
function renderLiveView(container) {
  const live = getLive();

  container.innerHTML = `
    <div class="live-layout">
      <div class="live-timer-card">
        <div class="timer-label">${live ? '● LIVE SESSION IN PROGRESS' : 'START A NEW SESSION'}</div>
        <div class="timer-display" id="timer-display">${live ? fmtTimer(Math.floor((Date.now() - live.startTime) / 1000)) : '00:00:00'}</div>
        <div class="live-stats-row" style="margin-bottom:1.5rem">
          <div class="live-stat">
            <div class="live-stat-label">Buy-in</div>
            <div class="live-stat-value" id="live-buyin-display">${live ? '$' + live.totalBuyIn.toLocaleString() : '-'}</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-label">Add-ons</div>
            <div class="live-stat-value" id="live-addons-display">${live ? live.addOns.length : '-'}</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-label">Est. Stack</div>
            <div class="live-stat-value" id="live-stack-display">-</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-label">Time</div>
            <div class="live-stat-value" id="live-hours-display">${live ? (Math.floor((Date.now() - live.startTime) / 3600000)).toFixed(1) + 'h' : '-'}</div>
          </div>
        </div>

        ${live ? `
          <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem">
            <button class="btn btn-secondary" id="addon-btn">+ Add-on / Rebuy</button>
            <button class="btn btn-gold" id="end-btn">⏹ End Session</button>
          </div>
        ` : `
          <div style="max-width:400px;margin:0 auto">
            <div class="form-grid" style="margin-bottom:1rem">
              <div class="form-group">
                <label>Location</label>
                <input type="text" id="live-location" list="live-loc-list" placeholder="Casino / Home game">
                <datalist id="live-loc-list">${[...new Set(getSessions().map(s=>s.location).filter(Boolean))].map(l=>`<option value="${l}">`).join('')}</datalist>
              </div>
              <div class="form-group">
                <label>Game Type</label>
                <input type="text" id="live-game" list="live-game-list" placeholder="NL Hold'em">
                <datalist id="live-game-list">${GAME_TYPES.map(g=>`<option value="${g}">`).join('')}</datalist>
              </div>
              <div class="form-group">
                <label>Stakes</label>
                <input type="text" id="live-stakes" list="live-stakes-list" placeholder="1/2">
                <datalist id="live-stakes-list">${STAKES_LIST.map(s=>`<option value="${s}">`).join('')}</datalist>
              </div>
              <div class="form-group">
                <label>Buy-in ($)</label>
                <input type="number" id="live-buyin" min="0" step="1" placeholder="200">
              </div>
            </div>
            <button class="btn btn-primary" id="start-btn" style="width:100%;padding:0.75rem;font-size:1rem">&#9654; Start Session</button>
          </div>
        `}
      </div>

      ${live ? `
        <div class="card">
          <div class="card-title-lg" style="margin-bottom:1rem">Add-ons / Rebuys</div>
          ${live.addOns.length === 0
            ? '<div class="empty-state" style="padding:1rem"><div class="empty-sub">No add-ons yet</div></div>'
            : live.addOns.map((a, i) => `<div class="recent-session"><div class="recent-left"><div class="recent-game">Add-on #${i+1}</div><div class="recent-meta">${new Date(a.time).toLocaleTimeString()}</div></div><div class="recent-profit positive">+$${a.amount}</div></div>`).join('')}
        </div>
      ` : `
        <div class="card">
          <div class="card-title-lg" style="margin-bottom:1rem">&#9998; Tips</div>
          <ul style="color:var(--text2);font-size:0.875rem;padding-left:1.25rem;line-height:1.9">
            <li>Start the timer when you sit down at the table</li>
            <li>Track add-ons and rebuys throughout the session</li>
            <li>End the session to automatically log it to your history</li>
            <li>The live session is saved even if you close the browser</li>
          </ul>
        </div>
      `}
    </div>
  `;

  if (live) {
    if (liveTimer) clearInterval(liveTimer);
    liveTimer = setInterval(() => {
      const elapsed = Math.floor((Date.now() - live.startTime) / 1000);
      const td = document.getElementById('timer-display');
      const hd = document.getElementById('live-hours-display');
      if (td) td.textContent = fmtTimer(elapsed);
      if (hd) hd.textContent = (elapsed / 3600).toFixed(2) + 'h';
      updateLiveBadge();
    }, 1000);

    container.querySelector('#addon-btn').addEventListener('click', () => {
      const amt = parseFloat(prompt('Add-on / Rebuy amount ($):'));
      if (isNaN(amt) || amt <= 0) return;
      live.addOns.push({ amount: amt, time: Date.now() });
      live.totalBuyIn += amt;
      saveLive(live);
      renderLiveView(container);
    });

    container.querySelector('#end-btn').addEventListener('click', () => {
      const cashOut = parseFloat(prompt('Enter cash-out amount ($):'));
      if (isNaN(cashOut) || cashOut < 0) { alert('Invalid amount'); return; }
      clearInterval(liveTimer); liveTimer = null;
      const durationMs = Date.now() - live.startTime;
      const duration = Math.round(durationMs / 3600000 * 4) / 4;
      addSession({
        date: new Date(live.startTime).toISOString().slice(0,10),
        location: live.location,
        gameType: live.gameType,
        stakes: live.stakes,
        buyIn: live.totalBuyIn,
        cashOut,
        duration,
        notes: live.addOns.length > 0 ? `${live.addOns.length} add-on(s): ${live.addOns.map(a=>'$'+a.amount).join(', ')}` : '',
        tags: 'Live',
        mood: 3,
      });
      saveLive(null);
      updateLiveBadge();
      alert(`Session ended! Result: ${fmt(cashOut - live.totalBuyIn)}`);
      switchView('sessions');
    });

  } else {
    container.querySelector('#start-btn').addEventListener('click', () => {
      const buyIn = parseFloat(container.querySelector('#live-buyin').value);
      if (!buyIn || buyIn <= 0) { alert('Enter a valid buy-in amount'); return; }
      const live = {
        startTime: Date.now(),
        location: container.querySelector('#live-location').value.trim(),
        gameType: container.querySelector('#live-game').value.trim(),
        stakes: container.querySelector('#live-stakes').value.trim(),
        totalBuyIn: buyIn,
        addOns: [],
      };
      saveLive(live);
      updateLiveBadge();
      renderLiveView(container);
    });
  }
}

// ===== GOALS =====
function renderGoalsView(container) {
  const goals = getGoals();
  const sessions = getSessions();
  const now = new Date();
  const thisMonth = now.toISOString().slice(0,7);
  const thisYear = now.getFullYear().toString();

  const monthlyProfit = sessions.filter(s => s.date && s.date.startsWith(thisMonth)).reduce((sum, s) => sum + (s.cashOut - s.buyIn), 0);
  const yearlyProfit = sessions.filter(s => s.date && s.date.startsWith(thisYear)).reduce((sum, s) => sum + (s.cashOut - s.buyIn), 0);
  const monthlyHours = sessions.filter(s => s.date && s.date.startsWith(thisMonth)).reduce((sum, s) => sum + (s.duration || 0), 0);
  const yearlySessions = sessions.filter(s => s.date && s.date.startsWith(thisYear)).length;

  function goalBlock(title, current, target, unit, color) {
    if (!target) return '';
    const pct = Math.min(100, Math.max(0, current / target * 100));
    const fill = current >= 0 ? color : 'var(--red)';
    const overshoot = current > target;
    return `
      <div class="goal-card">
        <div class="goal-header">
          <div>
            <div class="goal-title">${title}</div>
            <div class="goal-meta">${overshoot ? '🎉 Goal achieved!' : `${(target - current).toFixed(0)} ${unit} remaining`}</div>
          </div>
          <div class="goal-right">
            <div class="goal-pct" style="color:${fill}">${pct.toFixed(0)}%</div>
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${fill}"></div></div>
        <div class="goal-numbers">
          <span>${unit === 'sessions' ? current + ' sessions' : '$' + Math.abs(current).toLocaleString()}</span>
          <span>Target: ${unit === 'sessions' ? target + ' sessions' : '$' + target.toLocaleString()}</span>
        </div>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="section-title">Goals & Tracking</div>

    ${goalBlock('Monthly Profit Goal', monthlyProfit, goals.monthly, '$', 'var(--green)')}
    ${goalBlock('Yearly Profit Goal', yearlyProfit, goals.yearly, '$', 'var(--green)')}
    ${goalBlock('Monthly Hours Goal', monthlyHours, goals.monthlyHours, 'hours', 'var(--blue)')}
    ${goalBlock('Yearly Sessions Goal', yearlySessions, goals.yearlySessions, 'sessions', 'var(--gold)')}

    ${!goals.monthly && !goals.yearly && !goals.monthlyHours && !goals.yearlySessions
      ? `<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-title">No goals set</div><div class="empty-sub">Set your goals below to track your progress</div></div>`
      : ''}

    <div class="section-title" style="margin-top:1.5rem">Set Goals</div>
    <div class="goals-grid">
      <div class="goal-set-card">
        <div class="goal-set-title">&#128176; Monthly Profit Target ($)</div>
        <div class="form-group">
          <input type="number" id="g-monthly" min="0" step="50" placeholder="e.g. 1000" value="${goals.monthly || ''}">
        </div>
      </div>
      <div class="goal-set-card">
        <div class="goal-set-title">&#128200; Yearly Profit Target ($)</div>
        <div class="form-group">
          <input type="number" id="g-yearly" min="0" step="100" placeholder="e.g. 10000" value="${goals.yearly || ''}">
        </div>
      </div>
      <div class="goal-set-card">
        <div class="goal-set-title">&#9200; Monthly Hours Goal</div>
        <div class="form-group">
          <input type="number" id="g-hours" min="0" step="1" placeholder="e.g. 40" value="${goals.monthlyHours || ''}">
        </div>
      </div>
      <div class="goal-set-card">
        <div class="goal-set-title">&#127183; Yearly Sessions Goal</div>
        <div class="form-group">
          <input type="number" id="g-sessions" min="0" step="1" placeholder="e.g. 100" value="${goals.yearlySessions || ''}">
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="save-goals-btn">&#10003; Save Goals</button>
      <button class="btn btn-danger btn-sm" id="clear-goals-btn">Clear Goals</button>
    </div>
  `;

  container.querySelector('#save-goals-btn').addEventListener('click', () => {
    const g = {

// ===== LEAK FINDER ENGINE =====
function detectLeaks(sessions) {
  if (sessions.length < 5) return { leaks: [], score: null, insufficientData: true };

  const leaks = [];
  const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));
  const fmtA = (v) => (v >= 0 ? '+' : '') + '€' + Math.abs(v).toFixed(0);
  const avgProfit = s => s.reduce((t, x) => t + (x.cashOut - x.buyIn), 0) / s.length;

  // 1. SESSION DURATION LEAK
  const withDur = sessions.filter(s => s.duration > 0);
  if (withDur.length >= 6) {
    const short = withDur.filter(s => s.duration <= 3);
    const long  = withDur.filter(s => s.duration > 3);
    if (short.length >= 3 && long.length >= 3) {
      const sAvg = avgProfit(short), lAvg = avgProfit(long);
      if (lAvg < sAvg - 40) {
        leaks.push({
          id: 'duration', severity: lAvg < sAvg - 120 ? 'critical' : 'warning',
          title: 'Performance Drops in Long Sessions',
          icon: '⏳',
          description: `Sessions under 3h avg ${fmtA(sAvg)}, sessions over 3h avg ${fmtA(lAvg)}. You play worse when fatigued.`,
          data: [
            { label: 'Short sessions (≤3h)', value: fmtA(sAvg), count: short.length, positive: sAvg >= 0 },
            { label: 'Long sessions (>3h)',  value: fmtA(lAvg),  count: long.length,  positive: lAvg >= 0 },
          ],
          fix: 'Set a hard 3-hour session limit. Use a timer. Take 10-minute breaks every hour to stay sharp.',
        });
      }
    }
  }

  // 2. MOOD LEAK
  const withMood = sessions.filter(s => s.mood >= 1 && s.mood <= 5);
  if (withMood.length >= 6) {
    const bad  = withMood.filter(s => s.mood <= 2);
    const good = withMood.filter(s => s.mood >= 4);
    if (bad.length >= 2 && good.length >= 2) {
      const bAvg = avgProfit(bad), gAvg = avgProfit(good);
      if (bAvg < gAvg - 30) {
        leaks.push({
          id: 'mood', severity: bAvg < gAvg - 100 ? 'critical' : 'warning',
          title: 'Playing Below Optimal Mental State',
          icon: '🧠',
          description: `You average ${fmtA(bAvg)} when mood is 😴😐 vs ${fmtA(gAvg)} when feeling 😊🔥. Emotional state is hurting your game.`,
          data: [
            { label: 'Poor mood (😴😐)', value: fmtA(bAvg), count: bad.length,  positive: bAvg >= 0 },
            { label: 'Good mood (😊🔥)', value: fmtA(gAvg), count: good.length, positive: gAvg >= 0 },
          ],
          fix: 'Create a pre-session checklist: slept 7h+, not stressed, not hungry. If any fail — don\'t play.',
        });
      }
    }
  }

  // 3. DAY OF WEEK LEAK
  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowBuckets = Array(7).fill(null).map(() => []);
  sessions.forEach(s => { const d = new Date(s.date + 'T12:00:00').getDay(); dowBuckets[d].push(s); });
  const badDays = dowBuckets
    .map((arr, i) => ({ day: dows[i], arr, avg: arr.length >= 3 ? avgProfit(arr) : null }))
    .filter(d => d.avg !== null && d.avg < -40)
    .sort((a, b) => a.avg - b.avg);
  if (badDays.length > 0) {
    const worst = badDays[0];
    leaks.push({
      id: 'dow', severity: worst.avg < -150 ? 'critical' : 'warning',
      title: `Consistent Losses on ${worst.day}days`,
      icon: '📅',
      description: `You average ${fmtA(worst.avg)} on ${worst.day}s over ${worst.arr.length} sessions. Something about this day hurts your game.`,
      data: badDays.slice(0, 4).map(d => ({ label: d.day + 's', value: fmtA(d.avg), count: d.arr.length, positive: false })),
      fix: `Avoid playing on ${badDays.map(d => d.day + 's').join(', ')}. If you must, play shorter sessions with a strict stop-loss.`,
    });
  }

  // 4. TILT / LOSS CHASING
  let tiltCount = 0, tiltLoss = 0;
  for (let i = 1; i < sorted.length; i++) {
    const prev = sorted[i - 1], curr = sorted[i];
    const pp = prev.cashOut - prev.buyIn, cp = curr.cashOut - curr.buyIn;
    const dayDiff = (new Date(curr.date) - new Date(prev.date)) / 86400000;
    if (pp < -prev.buyIn * 0.5 && dayDiff <= 1 && cp < 0) { tiltCount++; tiltLoss += cp; }
  }
  if (tiltCount >= 2) {
    leaks.push({
      id: 'tilt', severity: tiltCount >= 4 ? 'critical' : 'warning',
      title: 'Tilt / Loss Chasing Detected',
      icon: '🔥',
      description: `${tiltCount} times you played the same or next day after a big losing session — and lost again. Total extra losses: ${fmtA(tiltLoss)}.`,
      data: [
        { label: 'Back-to-back loss sessions', value: tiltCount + 'x', count: tiltCount, positive: false },
        { label: 'Extra losses from chasing',  value: fmtA(tiltLoss), count: null, positive: false },
      ],
      fix: 'Mandatory rule: after losing more than 1 buy-in, take 24h off. No exceptions. Write it down as a rule.',
    });
  }

  // 5. WIN RATE LEAK
  const wins = sessions.filter(s => s.cashOut > s.buyIn).length;
  const wr = wins / sessions.length;
  if (wr < 0.42 && sessions.length >= 10) {
    leaks.push({
      id: 'winrate', severity: wr < 0.3 ? 'critical' : 'warning',
      title: 'Below-Average Win Rate',
      icon: '📊',
      description: `Win rate of ${(wr * 100).toFixed(0)}% is below the typical 45-55% for a winning player. You\'re losing more sessions than you should.`,
      data: [
        { label: 'Win rate', value: (wr * 100).toFixed(0) + '%', count: sessions.length, positive: false },
        { label: 'Winning sessions', value: wins + '', count: wins, positive: true },
        { label: 'Losing sessions', value: (sessions.length - wins) + '', count: sessions.length - wins, positive: false },
      ],
      fix: 'Focus on game selection (find softer tables), reduce bluffing frequency, and review your biggest losing sessions.',
    });
  }

  // 6. RAKE EATING PROFITS
  const totalRake = sessions.reduce((s, x) => s + (x.rake || 0), 0);
  const netProfit = sessions.reduce((s, x) => s + (x.cashOut - x.buyIn), 0);
  const grossProfit = netProfit + totalRake;
  if (totalRake > 0 && netProfit < 0 && grossProfit > 0) {
    leaks.push({
      id: 'rake', severity: 'critical',
      title: 'Rake is Costing You Your Profits',
      icon: '🏦',
      description: `Without rake you\'d be profitable (${fmtA(grossProfit)}), but rake of €${totalRake.toFixed(2)} puts you in the red. You need a higher edge to beat the rake.`,
      data: [
        { label: 'Gross profit (before rake)', value: fmtA(grossProfit),     positive: true },
        { label: 'Total rake paid',            value: '€' + totalRake.toFixed(2), positive: false },
        { label: 'Net profit (after rake)',     value: fmtA(netProfit),       positive: false },
      ],
      fix: 'Look for rakeback offers, play in softer games with higher edge, or consider lower-rake platforms.',
    });
  }

  // 7. STAKE JUMPING
  const stkSessions = sessions.filter(s => s.stakes && s.stakes.includes('/'));
  if (stkSessions.length >= 6) {
    const groups = {};
    stkSessions.forEach(s => {
      const bb = parseFloat(s.stakes.split('/')[1]) || 0;
      if (!groups[bb]) groups[bb] = [];
      groups[bb].push(s.cashOut - s.buyIn);
    });
    const stakeList = Object.entries(groups)
      .map(([bb, arr]) => ({ bb: parseFloat(bb), avg: avgProfit(arr), count: arr.length }))
      .filter(s => s.count >= 3)
      .sort((a, b) => a.bb - b.bb);
    if (stakeList.length >= 2) {
      const low = stakeList[0], high = stakeList[stakeList.length - 1];
      if (high.avg < 0 && low.avg > high.avg + 40) {
        leaks.push({
          id: 'stakes', severity: high.avg < -100 ? 'critical' : 'warning',
          title: 'Losing at Higher Stakes',
          icon: '📈',
          description: `You average ${fmtA(low.avg)} at ${low.bb} BB stakes but ${fmtA(high.avg)} at ${high.bb} BB. Your skill edge doesn\'t cover the higher stakes yet.`,
          data: [
            { label: `Stakes ${low.bb} BB`,  value: fmtA(low.avg),  count: low.count,  positive: low.avg >= 0 },
            { label: `Stakes ${high.bb} BB`, value: fmtA(high.avg), count: high.count, positive: high.avg >= 0 },
          ],
          fix: 'Build a proven winrate at your current stake before moving up. Aim for +20 buy-ins at one level first.',
        });
      }
    }
  }

  // 8. SHORT BUY-IN LEAK
  if (sessions.length >= 6) {
    const avgBI = sessions.reduce((s, x) => s + x.buyIn, 0) / sessions.length;
    const short = sessions.filter(s => s.buyIn < avgBI * 0.65);
    const full  = sessions.filter(s => s.buyIn >= avgBI * 0.65);
    if (short.length >= 3 && full.length >= 3) {
      const sAvg = avgProfit(short), fAvg = avgProfit(full);
      if (sAvg < fAvg - 30) {
        leaks.push({
          id: 'buyin', severity: 'warning',
          title: 'Short Buy-in Underperformance',
          icon: '💸',
          description: `Sessions where you bought in for less than usual (avg €${avgBI.toFixed(0)}) perform significantly worse.`,
          data: [
            { label: 'Short buy-in sessions', value: fmtA(sAvg), count: short.length, positive: sAvg >= 0 },
            { label: 'Full buy-in sessions',  value: fmtA(fAvg), count: full.length,  positive: fAvg >= 0 },
          ],
          fix: 'Always buy in for the full max. Short stacking limits your ability to apply pressure and maximize value.',
        });
      }
    }
  }

  // 9. CONSISTENCY / HIGH VARIANCE
  if (sessions.length >= 10) {
    const profits = sessions.map(s => s.cashOut - s.buyIn);
    const mean = profits.reduce((a, b) => a + b, 0) / profits.length;
    const stdDev = Math.sqrt(profits.reduce((s, x) => s + Math.pow(x - mean, 2), 0) / profits.length);
    const cv = Math.abs(stdDev / (Math.abs(mean) + 1));
    if (cv > 8 && stdDev > 200) {
      leaks.push({
        id: 'variance', severity: 'warning',
        title: 'Extremely High Variance',
        icon: '🎢',
        description: `Your results swing wildly (std dev €${stdDev.toFixed(0)}). Very high variance can mask whether you\'re actually winning or losing long-term.`,
        data: [
          { label: 'Biggest win',  value: fmtA(Math.max(...profits)), positive: true },
          { label: 'Biggest loss', value: fmtA(Math.min(...profits)), positive: false },
          { label: 'Std deviation', value: '€' + stdDev.toFixed(0), positive: false },
        ],
        fix: 'Consider playing lower stakes or avoiding PLO hi-variance spots. Build a larger sample to understand your true winrate.',
      });
    }
  }

  // 10. LOCATION LEAK
  const locGroups = {};
  sessions.forEach(s => { const l = s.location || 'Unknown'; if (!locGroups[l]) locGroups[l] = []; locGroups[l].push(s); });
  const locList = Object.entries(locGroups).filter(([, arr]) => arr.length >= 3).map(([loc, arr]) => ({ loc, avg: avgProfit(arr), count: arr.length }));
  if (locList.length >= 2) {
    const worst = locList.sort((a, b) => a.avg - b.avg)[0];
    const best  = locList.sort((a, b) => b.avg - a.avg)[0];
    if (worst.avg < -50 && best.avg - worst.avg > 80) {
      leaks.push({
        id: 'location', severity: 'warning',
        title: `Losing at ${worst.loc}`,
        icon: '📍',
        description: `You average ${fmtA(worst.avg)} at ${worst.loc} vs ${fmtA(best.avg)} at ${best.loc}. One venue is consistently hurting your results.`,
        data: locList.sort((a, b) => b.avg - a.avg).slice(0, 4).map(d => ({ label: d.loc, value: fmtA(d.avg), count: d.count, positive: d.avg >= 0 })),
        fix: `Play less at ${worst.loc} or look for better game conditions there (softer tables, different time of day).`,
      });
    }
  }

  // Health Score
  let score = 100;
  leaks.forEach(l => { score -= l.severity === 'critical' ? 22 : 11; });
  score = Math.max(5, Math.min(100, score));

  return { leaks, score };
}

function getHands()       { try { return JSON.parse(localStorage.getItem('pokerHands_v1') || '[]'); } catch { return []; } }
function saveHands(h)     { localStorage.setItem('pokerHands_v1', JSON.stringify(h)); }

function calcHandStats(hands) {
  if (!hands.length) return null;
  const total = hands.length;
  const wins   = hands.filter(h => h.result === 'Win').length;
  const losses = hands.filter(h => h.result === 'Loss').length;
  const totalPnl = hands.reduce((s, h) => s + (h.pnl || 0), 0);
  const vpip     = hands.filter(h => h.preflopAction && h.preflopAction !== 'Fold').length;
  const pfr      = hands.filter(h => ['Raise','3-Bet','4-Bet+','All-In'].includes(h.preflopAction)).length;
  const threeBet = hands.filter(h => h.preflopAction === '3-Bet').length;
  const flopSeen = hands.filter(h => h.sawFlop).length;
  const cbet     = hands.filter(h => h.cbet).length;
  const wtsd     = hands.filter(h => h.wentToShowdown).length;
  const wonAtSD  = hands.filter(h => h.wentToShowdown && h.result === 'Win').length;
  return {
    total, wins, losses, totalPnl,
    winRate:  ((wins  / total)    * 100).toFixed(1),
    vpip:     ((vpip  / total)    * 100).toFixed(1),
    pfr:      ((pfr   / total)    * 100).toFixed(1),
    threeBet: ((threeBet / total) * 100).toFixed(1),
    cbet:     flopSeen > 0 ? ((cbet / flopSeen)  * 100).toFixed(1) : '0.0',
    wtsd:     flopSeen > 0 ? ((wtsd / flopSeen)  * 100).toFixed(1) : '0.0',
    wonAtSD:  wtsd > 0    ? ((wonAtSD / wtsd)     * 100).toFixed(1) : '0.0',
    avgPnl:   (totalPnl / total).toFixed(2),
  };
}

function hlPnlCurve(hands) {
  let cum = 0;
  return [...hands].sort((a, b) => new Date(a.date) - new Date(b.date))
    .map((h, i) => { cum += h.pnl || 0; return { i: i + 1, pnl: cum }; });
}

    });

    // form submit
    if (hlView === 'add') bindHLForm(container, () => { hlView = 'stats'; draw(); });

    // history delete
    container.querySelectorAll('.hl-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const updated = getHands().filter(h => h.id !== btn.dataset.id);
        saveHands(updated); draw();
      });
    });

    // matrix cell click
    container.querySelectorAll('.hl-cell[data-ht]').forEach(cell => {
      cell.addEventListener('click', () => {
        const ht = cell.dataset.ht;
        const hs = getHands().filter(h => h.handType === ht);
        if (!hs.length) return;
        const w = hs.filter(h => h.result === 'Win').length;
        const pnl = hs.reduce((s, h) => s + (h.pnl || 0), 0);
        const info = container.querySelector('#hl-hand-info');
        if (info) info.innerHTML = `
          <span style="font-family:monospace;font-weight:700;color:var(--green);font-size:1.1rem">${ht}</span>
          <span style="font-size:0.78rem;color:var(--text2)">${hs.length} hands &nbsp;·&nbsp; ${((w/hs.length)*100).toFixed(0)}% win &nbsp;·&nbsp; ${pnl>=0?'+':''}${pnl.toFixed(0)} BB</span>
          <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem" id="hl-close-info">×</button>`;
        container.querySelector('#hl-close-info')?.addEventListener('click', () => { if(info) info.innerHTML=''; });
      });
    });
  }

  /* ── STATS VIEW ── */
  function renderHLStats(hands, stats) {
    if (!stats) return `
      <div style="text-align:center;padding:4rem 1rem;color:var(--text3)">
        <div style="font-size:3rem;margin-bottom:1rem">♠♥♦♣</div>
        <div style="font-size:1rem;color:var(--text2);margin-bottom:0.5rem">Your hand lab awaits</div>
        <div style="font-size:0.78rem;margin-bottom:1.5rem">Log hands to unlock VPIP, PFR, 3-Bet, C-Bet, WTSD, P&amp;L curve and the 13×13 matrix heatmap</div>
        <button class="btn btn-primary hl-tab" data-hl="add">+ Log First Hand</button>
      </div>`;

    const pnlData = hlPnlCurve(hands);
    const heatmap = buildHeatmap(hands);

    return `
      <!-- KPI row 1 -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem;margin-bottom:0.75rem">
        ${hlCard('Total Hands', stats.total, '', 'var(--green)')}
        ${hlCard('Win Rate', stats.winRate+'%', stats.wins+'W / '+stats.losses+'L', parseFloat(stats.winRate)>=50?'var(--green)':'var(--red)')}
        ${hlCard('Total P&L', (stats.totalPnl>=0?'+':'')+stats.totalPnl.toFixed(0)+' BB', stats.avgPnl+' BB/hand', stats.totalPnl>=0?'var(--green)':'var(--red)')}
        ${hlCard('VPIP', stats.vpip+'%', 'Vol. put $ in pot', '#a78bfa')}
      </div>
      <!-- KPI row 2 -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem;margin-bottom:1.25rem">
        ${hlCard('PFR', stats.pfr+'%', 'Preflop raise %', 'var(--gold)')}
        ${hlCard('3-Bet', stats.threeBet+'%', '', '#ef4444')}
        ${hlCard('C-Bet', stats.cbet+'%', 'Continuation bet', '#06b6d4')}
        ${hlCard('WTSD / W$SD', stats.wtsd+'% / '+stats.wonAtSD+'%', 'Showdown stats', '#8b5cf6')}
      </div>

      <!-- P&L Curve -->
      ${pnlData.length > 1 ? `
      <div class="card" style="margin-bottom:1rem;padding:1rem 1.25rem">
        <div style="font-size:0.75rem;font-weight:600;color:var(--text2);margin-bottom:0.75rem">📈 P&L Curve (BB)</div>
        ${buildPnlSvg(pnlData)}
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-size:0.65rem;color:var(--text3)">Hand #1</span>
          <span style="font-size:0.65rem;color:var(--text3)">Hand #${pnlData.length}</span>
        </div>
      </div>` : ''}

      <!-- Position chart -->
      <div class="card" style="margin-bottom:1rem;padding:1rem 1.25rem">
        <div style="font-size:0.75rem;font-weight:600;color:var(--text2);margin-bottom:0.75rem">🎯 Performance by Position</div>
        ${buildPositionBars(hands)}
      </div>

      <!-- Hand Matrix -->
      <div class="card" style="padding:1rem 1.25rem">
        <div style="font-size:0.75rem;font-weight:600;color:var(--text2);margin-bottom:0.5rem">♠ Hand Matrix Heatmap <span style="font-size:0.65rem;color:var(--text3);font-weight:400">· green = profitable · red = losing · click for details</span></div>
        <div id="hl-hand-info" style="display:flex;align-items:center;gap:1rem;min-height:1.6rem;margin-bottom:0.5rem;padding:0.4rem 0.75rem;background:rgba(0,212,170,0.05);border-radius:6px;border:1px solid rgba(0,212,170,0.1)"></div>
        <div style="overflow-x:auto">${buildMatrix(heatmap)}</div>
        <div style="display:flex;gap:1rem;margin-top:0.5rem;justify-content:center">
          <span style="font-size:0.68rem;color:var(--text3);display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(0,212,170,0.4);display:inline-block"></span> Profitable</span>
          <span style="font-size:0.68rem;color:var(--text3);display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(244,63,94,0.4);display:inline-block"></span> Losing</span>
        </div>
      </div>`;
  }

  /* ── HELPERS ── */
  function hlCard(label, value, sub, accent) {
    return `<div class="card" style="padding:1rem;position:relative;overflow:hidden">
      <div style="position:absolute;top:-10px;right:-10px;width:50px;height:50px;border-radius:50%;background:${accent};opacity:0.1;filter:blur(12px)"></div>
      <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:0.3rem">${label}</div>
      <div style="font-size:1.5rem;font-weight:700;color:${accent};font-family:monospace;line-height:1.1">${value}</div>
      ${sub ? `<div style="font-size:0.68rem;color:var(--text3);margin-top:0.2rem">${sub}</div>` : ''}
    </div>`;
  }

  function buildPnlSvg(data) {
    const W = 680, H = 120;
    const vals = data.map(d => d.pnl);
    const mn = Math.min(...vals, 0), mx = Math.max(...vals, 0);
    const range = mx - mn || 1;
    const pts = data.map((d, i) => {
      const x = (i / Math.max(data.length - 1, 1)) * W;
      const y = H - ((d.pnl - mn) / range) * H;
      return `${x},${y}`;
    }).join(' ');
    const zeroY = H - ((0 - mn) / range) * H;
    const fill = `0,${zeroY} ${pts} ${W},${zeroY}`;
    const last = vals[vals.length - 1];
    const col = last >= 0 ? '#00d4aa' : '#f43f5e';
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;height:${H}px">
      <defs><linearGradient id="hlGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${col}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
      </linearGradient></defs>
      <line x1="0" y1="${zeroY}" x2="${W}" y2="${zeroY}" stroke="rgba(255,255,255,0.06)" stroke-dasharray="4,4" stroke-width="1"/>
      <polygon points="${fill}" fill="url(#hlGrad)"/>
      <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  function buildPositionBars(hands) {
    const map = {};
    HL_POSITIONS.forEach(p => { map[p] = { total: 0, wins: 0, pnl: 0 }; });
    hands.forEach(h => { if (map[h.position]) { map[h.position].total++; if (h.result==='Win') map[h.position].wins++; map[h.position].pnl += h.pnl||0; } });
    const maxT = Math.max(...HL_POSITIONS.map(p => map[p].total), 1);
    const bars = HL_POSITIONS.map(p => {
      const s = map[p];
      const h = s.total > 0 ? Math.max((s.total / maxT) * 100, 6) : 3;
      const wr = s.total > 0 ? s.wins / s.total : 0;
      const col = s.total === 0 ? 'rgba(255,255,255,0.06)' : wr >= 0.5 ? 'var(--green)' : 'var(--red)';
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <span style="font-size:0.65rem;color:var(--text3);height:14px">${s.total>0 ? ((wr*100).toFixed(0)+'%') : ''}</span>
        <div style="width:100%;max-width:28px;height:${h}px;background:${col};border-radius:4px 4px 2px 2px;opacity:${s.total?0.8:0.3}" title="${p}: ${s.total} hands, ${s.pnl>=0?'+':''}${s.pnl.toFixed(0)} BB"></div>
        <span style="font-size:0.65rem;font-weight:700;color:var(--text3)">${p}</span>
      </div>`;
    }).join('');
    return `<div style="display:flex;align-items:flex-end;gap:4px;height:140px;padding:0 4px">${bars}</div>`;
  }

  function buildHeatmap(hands) {
    const map = {};
    hands.forEach(h => {
      if (!h.handType) return;
      if (!map[h.handType]) map[h.handType] = { total: 0, wins: 0, pnl: 0 };
      map[h.handType].total++;
      if (h.result === 'Win') map[h.handType].wins++;
      map[h.handType].pnl += h.pnl || 0;
    });
    return map;
  }

  function buildMatrix(heatmap) {
    const cells = HL_HAND_TYPES.map(ht => {
      const d = heatmap[ht];
      const count = d ? d.total : 0;
      const wr = d && d.total > 0 ? d.wins / d.total : 0;
      let bg = 'rgba(255,255,255,0.02)';
      if (count > 0) bg = d.pnl > 0 ? `rgba(0,212,170,${Math.min(0.15 + wr*0.5, 0.6)})` : `rgba(244,63,94,${Math.min(0.15 + (1-wr)*0.4, 0.5)})`;
      const cursor = count > 0 ? 'pointer' : 'default';
      const title = count > 0 ? `${ht}: ${count} hands, ${(wr*100).toFixed(0)}% win, ${d.pnl>=0?'+':''}${d.pnl.toFixed(0)} BB` : ht;
      return `<div class="hl-cell" data-ht="${ht}" style="background:${bg};border:1px solid ${count>0?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.03)'};border-radius:3px;padding:3px 1px;text-align:center;cursor:${cursor};min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center" title="${title}">
        <span style="font-size:0.6rem;font-weight:700;font-family:monospace;color:${count>0?'#fff':'rgba(255,255,255,0.2)'};letter-spacing:-0.5px">${ht}</span>
        ${count > 0 ? `<span style="font-size:0.5rem;color:rgba(255,255,255,0.45)">${count}</span>` : ''}
      </div>`;
    }).join('');
    return `<div style="display:grid;grid-template-columns:repeat(13,1fr);gap:2px;min-width:480px">${cells}</div>`;
  }

  /* ── HISTORY VIEW ── */
  function renderHLHistory(sorted) {
    if (!sorted.length) return `<div style="text-align:center;padding:3rem;color:var(--text3)">🃏 No hands recorded yet</div>`;
    const rows = sorted.slice(0, 100).map(h => {
      const pnl = h.pnl || 0;
      const pnlCol = pnl >= 0 ? 'var(--green)' : 'var(--red)';
      const resCol = h.result==='Win' ? 'var(--green)' : h.result==='Loss' ? 'var(--red)' : 'var(--gold)';
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0.75rem;border-bottom:1px solid rgba(255,255,255,0.04)">
        <div style="display:flex;align-items:center;gap:0.75rem">
          <span style="font-weight:700;font-family:monospace;color:${resCol};min-width:36px">${h.handType||'??'}</span>
          <span style="font-size:0.7rem;padding:1px 8px;border-radius:12px;background:rgba(255,255,255,0.06);color:var(--text3)">${h.position}</span>
          <span style="font-size:0.7rem;color:var(--text3)">${h.preflopAction}</span>
          <span style="font-size:0.68rem;color:var(--text3)">${h.date}</span>
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <span style="font-weight:700;font-family:monospace;color:${pnlCol}">${pnl>=0?'+':''}${pnl.toFixed(0)} BB</span>
          <button class="btn-icon hl-del" data-id="${h.id}" title="Delete">✕</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="card" style="overflow:hidden;padding:0"><div style="max-height:500px;overflow-y:auto">${rows}</div></div>`;
  }

  /* ── ADD HAND FORM ── */
  function renderHLForm() {
    const today = new Date().toISOString().slice(0, 10);
    const chipSet = (items, name, defaultVal, colorFn) => items.map(v =>
      `<button type="button" class="hl-chip${v===defaultVal?' selected':''}" data-group="${name}" data-val="${v}" style="${chipStyle(v===defaultVal, colorFn?colorFn(v):null)}">${v}</button>`
    ).join('');

    return `<div class="card" style="padding:1.25rem">
      <form id="hl-form" style="display:flex;flex-direction:column;gap:1.25rem">
        <div><label style="${lblS}">Date</label><input type="date" name="date" value="${today}" style="${inpS}"></div>
        <div><label style="${lblS}">Hand Type</label>
          <select name="handType" style="${inpS}">
            <option value="">Select hand...</option>
            ${HL_HAND_TYPES.map(h => `<option value="${h}">${h}</option>`).join('')}
          </select>
        </div>
        <div><label style="${lblS}">Position</label><div style="display:flex;flex-wrap:wrap;gap:6px">${chipSet(HL_POSITIONS,'position','CO')}</div></div>
        <div><label style="${lblS}">Preflop Action</label><div style="display:flex;flex-wrap:wrap;gap:6px">${chipSet(HL_ACTIONS,'preflopAction','Raise', v=>v==='Fold'?'var(--red)':v==='All-In'?'var(--gold)':null)}</div></div>
        <div><label style="${lblS}">Street Progression</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button type="button" class="hl-chip" data-group="sawFlop" data-val="true">Saw Flop</button>
            <button type="button" class="hl-chip" data-group="cbet" data-val="true">C-Bet</button>
            <button type="button" class="hl-chip" data-group="wentToShowdown" data-val="true">Went to SD</button>
          </div>
        </div>
        <div><label style="${lblS}">Result</label>
          <div style="display:flex;gap:6px">
            <button type="button" class="hl-chip selected" data-group="result" data-val="Win" style="${chipStyle(true,'var(--green)')}">Win</button>
            <button type="button" class="hl-chip" data-group="result" data-val="Loss" style="${chipStyle(false,'var(--red)')}">Loss</button>
            <button type="button" class="hl-chip" data-group="result" data-val="Break Even" style="${chipStyle(false,'var(--gold)')}">Break Even</button>
          </div>
        </div>
        <div><label style="${lblS}">Profit / Loss (BB)</label><input type="number" name="pnl" value="0" placeholder="e.g. +25 or -10" style="${inpS}" step="0.5"></div>
        <div><label style="${lblS}">Notes</label><textarea name="notes" placeholder="Villain tendencies, reads, mistakes..." style="${inpS}min-height:60px;resize:vertical"></textarea></div>
        <div style="display:flex;gap:0.75rem">
          <button type="submit" class="btn btn-primary" style="flex:1">Save Hand</button>
          <button type="button" class="btn btn-secondary hl-tab" data-hl="stats">Cancel</button>
        </div>
      </form>
    </div>`;
  }

  const lblS = 'display:block;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:0.4rem;';
  const inpS = 'width:100%;padding:0.55rem 0.75rem;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:0.85rem;outline:none;box-sizing:border-box;';

  function chipStyle(active, color) {
    const c = color || 'var(--green)';
    return active
      ? `padding:5px 14px;border-radius:20px;border:1px solid ${c};background:${c}22;color:${c};font-size:0.75rem;font-weight:600;cursor:pointer;font-family:monospace;`
      : `padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text3);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:monospace;`;
  }

  function bindHLForm(c, onDone) {
    // chip toggles
    c.querySelectorAll('.hl-chip[data-group]').forEach(chip => {
      chip.addEventListener('click', () => {
        const group = chip.dataset.group;
        const isBool = ['sawFlop','cbet','wentToShowdown'].includes(group);
        if (isBool) {
          chip.classList.toggle('selected');
          const isActive = chip.classList.contains('selected');
          chip.setAttribute('style', chipStyle(isActive));
        } else {
          c.querySelectorAll(`.hl-chip[data-group="${group}"]`).forEach(b => {
            b.classList.remove('selected');
            b.setAttribute('style', chipStyle(false, b.dataset.group==='result'?(b.dataset.val==='Win'?'var(--green)':b.dataset.val==='Loss'?'var(--red)':'var(--gold)'):null));
          });
          chip.classList.add('selected');
          const col = group==='result'?(chip.dataset.val==='Win'?'var(--green)':chip.dataset.val==='Loss'?'var(--red)':'var(--gold)')
                     : group==='preflopAction'?(chip.dataset.val==='Fold'?'var(--red)':chip.dataset.val==='All-In'?'var(--gold)':null) : null;
          chip.setAttribute('style', chipStyle(true, col));
        }
      });
    });

    // tab links inside form
    c.querySelectorAll('.hl-chip.hl-tab, .btn.hl-tab').forEach(btn => {
      btn.addEventListener('click', () => { hlView = btn.dataset.hl; draw(); });
    });

    c.querySelector('#hl-form')?.addEventListener('submit', e => {
      e.preventDefault();
      const f = e.target;
      const getChip = group => c.querySelector(`.hl-chip.selected[data-group="${group}"]`)?.dataset.val;
      const getBool = group => !!c.querySelector(`.hl-chip.selected[data-group="${group}"]`);
      const ht = f.handType.value;
      if (!ht) { alert('Select a hand type'); return; }
      const hand = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
        date: f.date.value,
        handType: ht,
        position: getChip('position') || 'CO',
        preflopAction: getChip('preflopAction') || 'Raise',
        sawFlop: getBool('sawFlop'),
        cbet: getBool('cbet'),
        wentToShowdown: getBool('wentToShowdown'),
        result: getChip('result') || 'Win',
        pnl: parseFloat(f.pnl.value) || 0,
        notes: f.notes.value.trim(),
      };
      const updated = [...getHands(), hand];
      saveHands(updated);
      onDone();
    });
  }

  draw();
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  // Bankroll
  const bankrollInput = document.getElementById('bankroll-input');
  bankrollInput.value = getBankroll() || '';
  bankrollInput.addEventListener('change', () => {
    const v = parseFloat(bankrollInput.value) || 0;
    saveBankroll(v);
  });

  // Nav
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  updateLiveBadge();
  setInterval(updateLiveBadge, 5000);

  switchView('dashboard');
});
</script>
</body>
</html>
